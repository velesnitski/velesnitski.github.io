<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Strawberry Dash 🦕🍓</title>
<meta name="description" content="Help the dino eat strawberries and dodge the bats — a one-button jumping game for kids.">
<meta name="theme-color" content="#c2d6cf">
<link rel="shortcut icon" type="image/x-icon" href="../favicons/favicon.ico">
<meta property="og:type" content="website">
<meta property="og:title" content="Strawberry Dash 🦕🍓">
<meta property="og:description" content="Eat strawberries, dodge bats — a one-button dino game.">
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:#0e1524;color:#e8eef5;display:flex;flex-direction:column;align-items:center;
       min-height:100%;text-align:center;-webkit-tap-highlight-color:transparent}
  h1{font-weight:800;margin:18px 0 2px;font-size:22px}
  .sub{opacity:.6;font-size:13px;margin-bottom:12px}
  .stage{border-radius:16px;box-shadow:0 18px 60px rgba(0,0,0,.5);overflow:hidden;
         width:min(760px,96vw);touch-action:manipulation;cursor:pointer;user-select:none}
  canvas{display:block;width:100%;height:auto}
  .panel{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center;margin:14px;
         background:#19202e;padding:10px 16px;border-radius:14px;max-width:96vw}
  .panel label{font-size:11px;display:flex;flex-direction:column;gap:5px;align-items:center;opacity:.85}
  button{background:#2b6cff;border:0;color:#fff;padding:8px 14px;border-radius:9px;font-size:13px;cursor:pointer;font-weight:600}
  button.alt{background:#2a3344}
  button.on{background:#22a05a}
  input[type=color]{width:40px;height:26px;border:0;background:none;cursor:pointer;padding:0}
  .foot{opacity:.4;font-size:12px;margin:6px 16px 30px;line-height:1.6}
  a{color:#7fb0ff}
  #pname{background:#2a3344;border:0;color:#fff;padding:9px 14px;border-radius:9px;font-size:13px;font-weight:600;width:118px;text-align:center}
  #pname::placeholder{color:#9fb0c0}
  #pname:focus{outline:2px solid #2b6cff}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(18px);
    background:#22a05a;color:#fff;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;
    opacity:0;pointer-events:none;transition:.3s;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .modal{position:fixed;inset:0;background:rgba(8,12,20,.72);display:none;z-index:30;align-items:center;justify-content:center}
  .modal.show{display:flex}
  .modalBox{background:#141c2b;border-radius:16px;padding:14px 16px;width:min(560px,94vw);max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .modalHead{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;margin-bottom:10px}
  .modalHead #walletLbl{margin-left:auto;color:#ffd27a}
  .modalHead #closetClose{background:#2a3344;border:0;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px}
  .modalTabs{display:flex;gap:8px;margin-bottom:10px}
  .modalTabs .tab{background:#2a3344;border:0;color:#cdd6e2;padding:7px 14px;border-radius:8px;cursor:pointer;font-weight:600}
  .modalTabs .tab.on{background:#2b6cff;color:#fff}
  .sbtn{flex:1;background:#2b6cff;border:0;color:#fff;padding:11px 12px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;min-width:104px}
  .sbtn.alt2{background:#2a3344;color:#dfe7f2}
  .shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
  .card{background:#1c2536;border-radius:12px;padding:8px;text-align:center}
  .card canvas{width:90px;height:80px;display:block;margin:0 auto;background:#cfe6df;border-radius:8px}
  .card .cName{font-size:12px;margin:5px 0;font-weight:600;color:#e8eef5}
  .card button{width:100%;background:#2b6cff;border:0;color:#fff;padding:6px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:700}
  .card button.eq{background:#22a05a}
  .card button.no{background:#3a4150;color:#8894a3;cursor:not-allowed}
  .card .rar{font-size:10px;font-weight:800;letter-spacing:.3px;margin-bottom:3px;text-transform:uppercase}
  .card.leg{animation:legpulse 1.6s ease-in-out infinite}
  @keyframes legpulse{0%,100%{box-shadow:0 0 2px rgba(255,176,46,.3)}50%{box-shadow:0 0 16px rgba(255,176,46,.9)}}
</style>
</head>
<body>
  <h1>🍓 Strawberry Dash</h1>
  <div class="sub">Eat 🍓, dodge 🦇 · tap / <b>space</b> to jump · tap again in the air to <b>dive</b></div>

  <div class="stage" id="stage"><canvas id="game" width="760" height="360"></canvas></div>

  <div class="panel">
    <button id="closet">🎽 Closet</button>
    <button class="alt" id="share">📤 Share</button>
    <button class="alt" id="challenge">⚔️ Challenge</button>
    <button class="alt" id="pause">⏸ Pause</button>
    <button class="alt" id="mute">🔊 Sound</button>
    <input type="text" id="pname" maxlength="12" placeholder="✏ name" title="your name">
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="closetModal"><div class="modalBox">
    <div class="modalHead">🎽 Closet <span id="walletLbl">🍓 0</span> <button id="closetClose">✕</button></div>
    <div class="modalTabs"><button class="tab on" data-tab="skin">Dinos</button><button class="tab" data-tab="hat">Hats</button><button class="tab" data-tab="gear">Gear</button><button class="tab" data-tab="achv">🏅</button><button class="tab" data-tab="stats">📊</button></div>
    <div class="shop" id="shop"></div>
  </div></div>

  <div class="modal" id="shareModal"><div class="modalBox" style="width:min(430px,94vw)">
    <div class="modalHead">📤 Share your dino <button id="shareClose" style="margin-left:auto;background:#2a3344;border:0;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px">✕</button></div>
    <img id="shareImg" alt="result card" style="width:100%;border-radius:10px;display:block;margin-bottom:12px">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="sbtn" id="shCopyLink">🔗 Copy link</button>
      <button class="sbtn alt2" id="shCopyImg">🖼 Copy image</button>
      <button class="sbtn alt2" id="shSave">⬇️ Save card</button>
    </div>
  </div></div>

  <div class="foot">Made for the kids · works on phones &amp; tablets · <a href="../">home</a></div>

<script>
const TAU=Math.PI*2;
function shade(hex,f){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const c=v=>Math.max(0,Math.min(255,Math.round(v)));
  return '#'+((1<<24)+(c(r*f)<<16)+(c(g*f)<<8)+c(b*f)).toString(16).slice(1); }
let bodyHex="#66b49a", plateHex="#9ad1bd", bellyHex="#f3e6c6";
const OUTLINE="#26383f", olw=5, BAND="#e0533b";

// ------------------------------------------------ dino (faces right when flip) --
function drawDino(ctx, cx, footY, s, o){
  o=o||{}; o.t=o.t||0;
  const BODY=bodyHex, DK=shade(bodyHex,0.80), CREAM=bellyHex, PLATE=plateHex;
  const open=('open'in o)?o.open:1;
  const hipY=-30;
  const legs=[ {x:-2,far:1},{x:34,far:1},{x:-18,far:0},{x:20,far:0} ];
  legs.forEach((L,i)=>{ let fx=L.x, fy=L.far?-1:1, lift=0;
    if(o.jump){ fy=-18; fx=L.x*0.7; }
    else if(o.walk){ const ph=o.t*0.28 + (i%2?Math.PI:0) + (L.far?Math.PI:0);
      fx=L.x+Math.cos(ph)*6; lift=Math.max(0,Math.sin(ph))*8; fy=(L.far?-1:1)-lift; }
    L.fx=fx; L.fy=fy; });
  let bob = o.jump? -8 : (o.walk? -Math.abs(Math.sin(o.t*0.56))*2 : Math.sin(o.t*0.05)*1.5);

  ctx.save(); ctx.translate(cx, footY+bob); ctx.scale((o.flip?-s:s)*(o.sx||1), s*(o.sy||1));
  if(o.rot) ctx.rotate(o.rot);

  ctx.fillStyle='rgba(30,55,60,.28)';
  ctx.beginPath(); ctx.ellipse(10,8-bob,86,14,0,0,TAU); ctx.fill();
  if(o.tier>=3){ const p=0.2+0.08*Math.sin(o.t*0.15);   // run-tier 3: golden champion aura
    const tg=ctx.createRadialGradient(14,-62,8,14,-62,95); tg.addColorStop(0,'rgba(255,215,90,'+p+')'); tg.addColorStop(1,'rgba(255,215,90,0)');
    ctx.fillStyle=tg; ctx.beginPath(); ctx.ellipse(14,-62,95,86,0,0,TAU); ctx.fill(); }
  if(o.glow){ const p=0.34+0.14*Math.sin(o.t*0.12);   // molten ember aura (lava skin)
    const gg=ctx.createRadialGradient(14,-62,8,14,-62,92); gg.addColorStop(0,'rgba(255,150,60,'+(p+0.18)+')'); gg.addColorStop(.55,'rgba(255,90,40,'+(p*0.5)+')'); gg.addColorStop(1,'rgba(255,90,40,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.ellipse(14,-62,92,84,0,0,TAU); ctx.fill(); }
  if(o.cape){ const f=o.t*0.14;   // hero cape — billows up over the back and past the tail
    ctx.beginPath(); ctx.moveTo(-16,-102);
    ctx.quadraticCurveTo(34,-136+Math.sin(f)*5, 88,-142+Math.sin(f+1)*7);   // top edge rises above the plates
    ctx.quadraticCurveTo(122,-124, 120,-66+Math.sin(f+2)*6);                // outer sweep beyond the tail
    ctx.quadraticCurveTo(116,-32, 88,-12+Math.sin(f+3)*6);
    ctx.quadraticCurveTo(52,0+Math.sin(f+4)*4, 24,-18);                     // wavy bottom hem
    ctx.quadraticCurveTo(-4,-40, -16,-96); ctx.closePath();
    const cg=ctx.createLinearGradient(-16,-140,110,-10); cg.addColorStop(0,'#e04a3c'); cg.addColorStop(1,'#7d1e22');
    ctx.lineJoin='round'; ctx.lineWidth=olw*2; ctx.strokeStyle=OUTLINE; ctx.stroke(); ctx.fillStyle=cg; ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.14)'; ctx.beginPath(); ctx.moveTo(4,-58); ctx.quadraticCurveTo(50,-56,84,-36); ctx.quadraticCurveTo(44,-76,2,-78); ctx.closePath(); ctx.fill();   // inner fold
    ctx.fillStyle='rgba(255,255,255,.16)'; ctx.beginPath(); ctx.moveTo(10,-116); ctx.quadraticCurveTo(48,-132,84,-134); ctx.quadraticCurveTo(46,-124,16,-108); ctx.closePath(); ctx.fill(); }   // top sheen

  const legCap=(L,w,fill)=>{ ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(L.x,hipY); ctx.lineTo(L.fx,L.fy);
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=w+olw*2; ctx.stroke(); ctx.strokeStyle=fill; ctx.lineWidth=w; ctx.stroke(); };
  legs.filter(L=>L.far).forEach(L=>legCap(L,24,DK));   // chubby legs

  const tailPath=()=>{ ctx.moveTo(46,-50);
    ctx.bezierCurveTo(104,-44,120,-80,102,-106); ctx.bezierCurveTo(96,-118,78,-114,84,-98);
    ctx.bezierCurveTo(88,-84,66,-70,46,-86); ctx.closePath(); };
  const parts=(mode)=>{
    const el=(x,y,rx,ry)=>{ ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,TAU);
      if(!mode){ ctx.lineJoin='round'; ctx.lineWidth=olw*2; ctx.strokeStyle=OUTLINE; ctx.stroke(); ctx.fillStyle=OUTLINE; } else ctx.fillStyle=BODY; ctx.fill(); };
    const cap=(x1,y1,x2,y2,w)=>{ ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      if(!mode){ ctx.lineWidth=w+olw*2; ctx.strokeStyle=OUTLINE; } else { ctx.lineWidth=w; ctx.strokeStyle=BODY; } ctx.stroke(); };
    legs.filter(L=>!L.far).forEach(L=>{ ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(L.x,hipY); ctx.lineTo(L.fx,L.fy);
      if(!mode){ ctx.lineWidth=26+olw*2; ctx.strokeStyle=OUTLINE; } else { ctx.lineWidth=26; ctx.strokeStyle=BODY; } ctx.stroke(); });
    ctx.beginPath(); tailPath();
    if(!mode){ ctx.lineJoin='round'; ctx.lineWidth=olw*2; ctx.strokeStyle=OUTLINE; ctx.stroke(); ctx.fillStyle=OUTLINE; } else ctx.fillStyle=BODY; ctx.fill();
    el(14,-66,56,44); cap(-22,-80,-52,-122,46);
    el(-63,-145,35,33); el(-86,-146,16,14); el(-43,-162,10,9); el(-40,-134,9,8);   // +10% head = baby schema
  };
  parts(0); parts(1);

  ctx.save(); ctx.beginPath(); ctx.ellipse(14,-66,56,44,0,0,TAU); ctx.clip();
    ctx.fillStyle=shade(bodyHex,0.9); ctx.beginPath(); ctx.ellipse(20,-30,54,22,0,0,TAU); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.15)'; ctx.beginPath(); ctx.ellipse(0,-96,42,17,0,0,TAU); ctx.fill();   // top-light
    ctx.fillStyle=shade(bodyHex,0.84);   // haunch freckles
    [[40,-52,3],[50,-63,2.4],[32,-62,2.2],[45,-42,2]].forEach(([fx,fy,fr])=>{ ctx.beginPath(); ctx.arc(fx,fy,fr,0,TAU); ctx.fill(); });
  ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,.13)'; ctx.lineWidth=11; ctx.lineCap='round';   // neck top-light
  ctx.beginPath(); ctx.moveTo(-14,-88); ctx.lineTo(-42,-124); ctx.stroke();

  ctx.lineCap='round'; ctx.strokeStyle=CREAM; ctx.lineWidth=15;
  ctx.beginPath(); ctx.moveTo(-66,-124); ctx.quadraticCurveTo(-46,-92,-30,-64); ctx.stroke();
  ctx.save(); ctx.beginPath(); ctx.ellipse(14,-66,56,44,0,0,TAU); ctx.clip();
    ctx.fillStyle=CREAM; ctx.beginPath(); ctx.ellipse(-16,-44,32,22,0,0,TAU); ctx.fill(); ctx.restore();

  const plates=[[-30,-92,8,7],[-14,-104,11,9],[2,-111,12,10],[20,-112,12,10],[38,-108,11,9],[54,-99,10,8],[68,-87,8,6]];
  plates.forEach(([x,y,rx,ry])=>{ ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,TAU);
    ctx.fillStyle=PLATE; ctx.fill(); ctx.lineWidth=2.4; ctx.strokeStyle=shade(plateHex,0.72); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.beginPath(); ctx.ellipse(x-2,y-2,rx*0.4,ry*0.4,0,0,TAU); ctx.fill(); });
  if(o.starry){ ctx.save(); ctx.beginPath(); ctx.ellipse(14,-66,56,44,0,0,TAU); ctx.clip(); ctx.fillStyle='#fff';   // galaxy sparkles on the body
    [[-6,-56,1.4],[18,-72,1.1],[38,-58,1.3],[-18,-70,1],[8,-46,1.2],[30,-82,1],[46,-70,1.1],[-2,-82,1],[24,-52,1.2],[-14,-50,1]].forEach(([sx,sy,r])=>{
      ctx.globalAlpha=0.55+0.4*Math.sin(o.t*0.1+sx); ctx.beginPath(); ctx.arc(sx,sy,r,0,TAU); ctx.fill(); }); ctx.globalAlpha=1; ctx.restore(); }

  ctx.save(); ctx.beginPath(); ctx.ellipse(-63,-145,35,33,0,0,TAU); ctx.clip();
    ctx.fillStyle='rgba(255,255,255,.12)'; ctx.beginPath(); ctx.ellipse(-72,-162,20,11,-.3,0,TAU); ctx.fill(); ctx.restore();

  if(o.ko){   // knocked-out ✕ eyes
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=3.4; ctx.lineCap='round'; ctx.beginPath();
    ctx.moveTo(-77,-151); ctx.lineTo(-67,-141); ctx.moveTo(-67,-151); ctx.lineTo(-77,-141); ctx.stroke();
  } else if(o.shades){
    const lg=ctx.createLinearGradient(-78,-155,-66,-138); lg.addColorStop(0,'#3d5a75'); lg.addColorStop(.55,'#1c2f40'); lg.addColorStop(1,'#101c26');
    ctx.fillStyle=lg; ctx.strokeStyle=OUTLINE; ctx.lineWidth=3.4;
    ctx.beginPath(); ctx.ellipse(-72,-146,13,9.5,-.14,0,TAU); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.8;   // top rim light
    ctx.beginPath(); ctx.ellipse(-72,-146,10.3,7.2,-.14,Math.PI*1.05,Math.PI*1.75); ctx.stroke();
    ctx.lineWidth=3.4; ctx.beginPath(); ctx.moveTo(-60,-151); ctx.lineTo(-44,-154); ctx.stroke();
    ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-86,-147); ctx.lineTo(-88,-148); ctx.stroke();
    const gx=-72+Math.sin(o.t*0.09)*7;   // glint sweeps across the lens
    ctx.save(); ctx.beginPath(); ctx.ellipse(-72,-146,13,9.5,-.14,0,TAU); ctx.clip();
      ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=3; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(gx-4,-151); ctx.lineTo(gx+4,-141); ctx.stroke();
    ctx.restore();
    if((o.t%210)<10){ const k=1-((o.t%210)/10), r=3+k*3, sx=-63,sy=-150;   // periodic cool ✦ twinkle
      ctx.strokeStyle='rgba(255,255,255,'+(0.45+0.5*k)+')'; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(sx-r,sy); ctx.lineTo(sx+r,sy); ctx.moveTo(sx,sy-r); ctx.lineTo(sx,sy+r); ctx.stroke(); }
  } else if(open<0.2){
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(-72,-144,7.5,Math.PI*1.15,Math.PI*1.85); ctx.stroke();
  } else {
    ctx.fillStyle='#182226'; ctx.beginPath(); ctx.ellipse(-72,-146,7,8*open,0,0,TAU); ctx.fill();
    if(open>0.5){ ctx.fillStyle='#fff';   // dual catch-lights (hidden mid-blink)
      ctx.beginPath(); ctx.ellipse(-74.8,-149,2.8,3,0,0,TAU); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-69.2,-142.6,1.35,1.45,0,0,TAU); ctx.fill();
      ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.7; ctx.lineCap='round'; ctx.beginPath();   // eyelashes
      ctx.moveTo(-78.2,-149.6); ctx.lineTo(-82.4,-151.6);
      ctx.moveTo(-77,-152.2); ctx.lineTo(-80.6,-155);
      ctx.moveTo(-74.6,-153.8); ctx.lineTo(-77,-157.4); ctx.stroke(); }
  }
  ctx.fillStyle='rgba(238,110,140,.42)'; ctx.beginPath(); ctx.ellipse(-58.5,-134,6.4,4.2,-.12,0,TAU); ctx.fill();   // cheek blush
  ctx.fillStyle=OUTLINE; ctx.beginPath(); ctx.ellipse(-94,-150,2,2.4,0,0,TAU); ctx.fill();
  const mouth=o.mouth||0;
  if(o.ko){   // dazed: open maw + tongue lolling out
    ctx.fillStyle='#7a2233'; ctx.beginPath(); ctx.ellipse(-85,-134,5.5,4,0,0,TAU); ctx.fill();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=2.4; ctx.stroke();
    const tw=Math.sin(o.t*0.08)*1.5;
    ctx.fillStyle='#f0839a'; ctx.beginPath(); ctx.ellipse(-87+tw*0.4,-127,3,6,0.25,0,TAU); ctx.fill();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.8; ctx.stroke();
  } else if(mouth>0.15){   // open jaw — chomping a berry / excited mid-air
    ctx.fillStyle='#7a2233'; ctx.beginPath(); ctx.ellipse(-85,-134,6,2.4+mouth*5,0,0,TAU); ctx.fill();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=2.4; ctx.stroke();
    ctx.fillStyle='#f0839a'; ctx.beginPath(); ctx.ellipse(-85,-131+mouth*2,3.2,1.4+mouth*2,0,0,TAU); ctx.fill();
  } else {
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=2.8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-93,-137); ctx.quadraticCurveTo(-84,-131.5,-76,-136); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.6;   // tiny buck tooth
    ctx.beginPath(); ctx.roundRect(-87,-134.6,5,4.6,1.6); ctx.fill(); ctx.stroke();
  }

  if(o.tier>=2){ const fl=Math.sin(o.t*0.25)*4;   // run-tier 2: determination headband
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=10; ctx.lineCap='round'; ctx.beginPath(); ctx.arc(-63,-145,33,Math.PI*1.02,Math.PI*1.52); ctx.stroke();
    ctx.strokeStyle='#e5384e'; ctx.lineWidth=7; ctx.beginPath(); ctx.arc(-63,-145,33,Math.PI*1.02,Math.PI*1.52); ctx.stroke();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=8; ctx.beginPath();   // fluttering ribbon tails
    ctx.moveTo(-36,-170); ctx.quadraticCurveTo(-24,-176+fl,-12,-172+fl); ctx.moveTo(-36,-170); ctx.quadraticCurveTo(-26,-164-fl,-16,-160-fl); ctx.stroke();
    ctx.strokeStyle='#e5384e'; ctx.lineWidth=5; ctx.beginPath();
    ctx.moveTo(-36,-170); ctx.quadraticCurveTo(-24,-176+fl,-12,-172+fl); ctx.moveTo(-36,-170); ctx.quadraticCurveTo(-26,-164-fl,-16,-160-fl); ctx.stroke();
    ctx.fillStyle='#c02a3c'; ctx.beginPath(); ctx.arc(-36,-170,4.5,0,TAU); ctx.fill(); ctx.strokeStyle=OUTLINE; ctx.lineWidth=2; ctx.stroke(); }
  if(o.hat && o.hat!=='none'){ ctx.save(); ctx.translate(-1,-5); const hx=-62;   // hats ride the bigger head
    if(o.hat==='panama' || o.hat===true){
      const sg=ctx.createLinearGradient(0,-208,0,-166); sg.addColorStop(0,'#f8e6a6'); sg.addColorStop(1,'#e6c778');
      ctx.beginPath(); ctx.moveTo(hx-30,-172); ctx.bezierCurveTo(hx-26,-206,hx+26,-206,hx+30,-172);
      ctx.lineJoin='round'; ctx.lineWidth=olw*2; ctx.strokeStyle=OUTLINE; ctx.stroke(); ctx.fillStyle=sg; ctx.fill();
      ctx.save(); ctx.beginPath(); ctx.moveTo(hx-30,-172); ctx.bezierCurveTo(hx-26,-206,hx+26,-206,hx+30,-172); ctx.closePath(); ctx.clip();
        ctx.fillStyle=BAND; ctx.fillRect(hx-34,-192,68,11); ctx.restore();
      ctx.beginPath(); ctx.ellipse(hx,-170,44,12,0,0,TAU);

  const rnd=mulberry32(hashStr(today)), pool=MPOOL.slice(), pick=[];
  for(let i=0;i<3 && pool.length;i++){ const m=pool.splice(Math.floor(rnd()*pool.length),1)[0], g=m.goals[Math.floor(rnd()*m.goals.length)];

function missionEvent(type,amount){ if(!missions.length) return; let ch=false;

const FIGHTS=['worm','bat','crab','crow'];
function makeBoss(type,hp,mega){
  const y = type==='worm'?groundY+30 : type==='crow'?groundY-150 : (type==='crab'||type==='tortoise')?groundY-16 : groundY-118;
  return {type, hp, hp0:hp, mega, x:W+100, y, hx:dinoX, hy:y, hy0:groundY+30, trail:[], phase:type==='worm'?'hidden':'enter', pt:0, inv:0, age:0, bounces:0};
}
function spawnBoss(){ bossCount++;
  ents.forEach(e=>{ if((e.k==='bat'||e.k==='rock')&&!e.dead){ e.dead=true; sparkle(e.x,e.y); } });   // hazards flee — clean arena for the duel
  if(bossCount%3===0){ boss=makeBoss('tortoise',1,false); toast('🐢 Granny Tortoise! Bounce on her shell 3×!'); sfxPower(); return; }
  const mega = bossCount%4===0;
  const type = FIGHTS[fightCount++%FIGHTS.length];
  const hp = mega?5 : (bossCount<=2?2:3);
  boss=makeBoss(type,hp,mega);
  const NAME={worm:'🪱 WORM BOSS! bop its head '+hp+'×', bat:'🦇 BOSS! jump on it '+hp+'×',
    crab:'🦀 CRAB BOSS! stomp it '+hp+'× — not when claws are up 🛡!', crow:'🐦‍⬛ CROW BOSS! it fakes dives — dodge the real one, stomp the crash!'};
  toast((mega?'👑 MEGA ':'')+NAME[type]); }
function endBoss(){ nextBoss=Math.floor(score)+Math.max(320, 560-bossCount*40); }
function bossHit(b){ b.hp--; b.inv=40; vel=-13; diving=false; air=true; hitstop=5; shake=12; hitBurst(b.hx||b.x,b.hy||b.y); shieldPop(b.hx||b.x,b.hy||b.y); sfxLand(); vibe(40); pop('HIT!',dinoX,groundY+dy-100,'#ffd54a');
  if(b.hp<=0){ b.phase='defeat'; b.pt=0; const rw=b.mega?80:30; score+=b.mega?120:50; wallet+=rw; saveCloset(); stats.bosses++; saveStats(); endBoss(); confetti(); sfxWin(); toast(b.mega?'🏆 CHAMPION! +'+rw+' 🍓':'💥 BOSS DOWN! +'+rw+' 🍓'); vibe(120); } }
function bossShieldEat(b){ shield=false; invuln=48; b.inv=26; shieldPop(dinoX,groundY+dy-64); shake=8; combo=0; heat=0; sfxShield(); vibe(40); }
function updateBoss(){ const b=boss; if(b.type==='worm'){ updateWorm(b); return; }
  if(b.type==='crab'){ updateCrab(b); return; }
  if(b.type==='tortoise'){ updateTortoise(b); return; }
  if(b.type==='crow'){ updateCrow(b); return; }
  b.pt++; b.age++; if(b.inv>0) b.inv--;
  if(b.phase==='enter'){ b.x+=(W-140-b.x)*0.06; b.y=b.hy+Math.sin(b.age*0.1)*8; if(b.x<W-138){ b.phase='hover'; b.pt=0; } }
  else if(b.phase==='hover'){ b.x=W-140; b.y=b.hy+Math.sin(b.age*0.1)*8;
    if(b.pt>(b.mega?60:80)){ b.phase='wind'; b.pt=0; } if(b.age>2000){ b.phase='flee'; endBoss(); } }
  else if(b.phase==='wind'){ b.y=b.hy-Math.min(24,b.pt*1.4); if(b.pt>(b.mega?18:26)){ b.phase='swoop'; b.pt=0; b.sx=b.x; } }
  else if(b.phase==='swoop'){ const dur=b.mega?48:58, k=Math.min(1,b.pt/dur), s=Math.sin(k*Math.PI); b.x=b.sx+(dinoX+30-b.sx)*s; b.y=(b.hy-24)+((groundY-34)-(b.hy-24))*s; if(b.pt>dur){ b.phase='hover'; b.pt=0; } }
  else if(b.phase==='defeat'||b.phase==='flee'){ b.y-=6; b.x+=3; if(b.y<-100) boss=null; return; }
  const bw=b.mega?52:40, bh=b.mega?58:48;
  if(b.inv<=0 && Math.abs(b.x-dinoX)<bw && Math.abs((groundY+dy-58)-b.y)<bh){
    if(air) bossHit(b); else if(shield) bossShieldEat(b); else if(invuln<=0) over(); }
}
function updateWorm(b){ b.pt++; b.age++; if(b.inv>0) b.inv--;
  if(b.phase==='hidden'){ b.hy=b.hy0; b.hx=dinoX+150;
    if(b.pt>(b.mega?32:46)){ b.phase='erupt'; b.pt=0; b.trail=[]; b.startX=dinoX+150; b.endX=dinoX-150; dust(dinoX+150); }
    if(b.age>2400){ b.phase='flee'; endBoss(); } }
  else if(b.phase==='erupt'){ const dur=b.mega?70:84, k=Math.min(1,b.pt/dur);
    b.hx = b.startX + (b.endX-b.startX)*k;
    b.hy = b.hy0 - Math.sin(k*Math.PI)*(b.hy0-(groundY-98));
    if(b.pt>dur){ b.phase='hidden'; b.pt=0; dust(b.endX); } }
  else if(b.phase==='defeat'||b.phase==='flee'){ b.hy+=7; if(b.hy>groundY+150) boss=null; return; }
  b.trail.unshift({x:b.hx,y:b.hy}); if(b.trail.length>46) b.trail.pop();
  if(b.phase==='erupt' && b.hy<groundY-2){ const dcy=groundY+dy-58;
    if(b.inv<=0 && Math.abs(b.hx-dinoX)<(b.mega?32:26) && Math.abs(dcy-b.hy)<(b.mega?30:24)){
      if(air){ bossHit(b); return; } else if(shield){ bossShieldEat(b); return; } else if(invuln<=0){ over(); return; } }
    if(invuln<=0 && b.inv<=0){ const segs=b.mega?7:5;
      for(let i=1;i<=segs;i++){ const sp=b.trail[Math.min(i*5, b.trail.length-1)]; if(!sp || sp.y>groundY-2) continue;
        if(Math.abs(sp.x-dinoX)<16 && Math.abs(dcy-sp.y)<18){ if(shield) bossShieldEat(b); else over(); break; } } }
  }
}
function updateCrab(b){ b.pt++; b.age++; if(b.inv>0) b.inv--; if(b.bcd>0) b.bcd--;
  const gy=groundY-16;
  if(b.phase==='enter'){ b.x-=4.6; b.y=gy; if(b.x<W-170){ b.phase='shuffle'; b.pt=0; } }
  else if(b.phase==='shuffle'){   // claws DOWN, stompable — and he keeps CLOSING IN on you
    b.x=Math.max(dinoX+26, b.x-(b.mega?1.15:0.95)+Math.sin(b.age*0.12)*1.4); b.y=gy-Math.abs(Math.sin(b.age*0.3))*3;
    if(b.age%50===0) parts.push({x:b.x-14,y:b.y-26,vx:-0.4,vy:-0.9,g:-0.008,life:34,r:2.5,c:'rgba(170,220,255,.7)'});   // bubbles
    if(b.pt>(b.mega?66:88)){ b.phase='guard'; b.pt=0; }
    if(b.age>2100){ b.phase='flee'; endBoss(); } }
  else if(b.phase==='guard'){ b.y=gy;   // claws UP — stomps just CLACK off (harmless)
    if(b.pt>(b.mega?42:56)){ b.phase='shuffle'; b.pt=0; } }
  else if(b.phase==='defeat'){ b.y-=6; b.x+=4; if(b.y<-100) boss=null; return; }
  else if(b.phase==='flee'){ b.x+=5; b.y=gy; if(b.x>W+90) boss=null; return; }
  const r=b.mega?46:38, feet=groundY+dy;
  if(Math.abs(b.x-dinoX)<r){
    if(air && vel>0 && feet>b.y-54 && feet<b.y+10){   // landing on him from above (feet-based)
      if(b.phase==='guard'){ if(b.bcd<=0){ b.bcd=20; vel=-12; diving=false; hitstop=2;   // blocked!
        pop('CLACK!',b.x,b.y-64,'#c9d4e8'); shieldPop(b.x,b.y-40); sfxNice(); vibe(15); } }
      else if(b.inv<=0){ bossHit(b); b.x=Math.min(W-80,b.x+80); } }   // knocked back — re-approaches
    else if(!air && Math.abs(b.x-dinoX)<r-8 && b.inv<=0 && invuln<=0){
      if(shield) bossShieldEat(b); else over(); } }
}
function updateTortoise(b){ b.pt++; b.age++; if(b.squish>0) b.squish--;
  const gy=groundY-16; b.y=gy+(b.phase==='nap'?0.5:Math.sin(b.age*0.15)*1.2);
  if(b.phase==='enter'){ b.x-=2.6; if(b.x<W-190){ b.phase='stroll'; b.pt=0; } }
  else if(b.phase==='stroll'){ b.x-=1.15;
    if(b.pt>130 && Math.random()<0.012){ b.phase='nap'; b.pt=0; }   // granny nap time
    if(b.x<-80){ boss=null; endBoss(); return; } }

const PAL={

  dusk: {a:'#f79a58',b:'#c07ba0',c:'#5f4f82', hill:'#7f8fa6', gr:'#caa878', dash:'#a98f5f', cloud:'rgba(255,205,190,.6)',  orb:'#ff7a48', night:0, low:1},
  night:{a:'#121a3e',b:'#1d2550',c:'#2a3352', hill:'#333f68', gr:'#4a4a60', dash:'#5b5b74', cloud:'rgba(205,210,235,.28)', orb:'#eef2ff', night:1, low:0}
};
function bg(){
  const hr=(new Date()).getHours(); const forced=P.get('bg');
  const ph = (PAL[forced]?forced : (hr<5?'night' : hr<8?'dawn' : hr<18?'day' : hr<21?'dusk' : 'night'));
  const C=PAL[ph];
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,C.a); g.addColorStop(.6,C.b); g.addColorStop(1,C.c);
  ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
  if(C.night){ ctx.fillStyle='#fff'; for(let i=0;i<40;i++){ const sx=(i*97+13)%W, sy=(i*53+7)%180;
    ctx.globalAlpha=0.3+0.6*(0.5+0.5*Math.sin(t*0.05+i)); ctx.fillRect(sx,sy,2,2); } ctx.globalAlpha=1; }
  const ox=W-80, oy=C.low?120:66;
  ctx.fillStyle=C.orb; ctx.beginPath(); ctx.arc(ox,oy,30,0,TAU); ctx.fill();
  if(C.night){ ctx.fillStyle=C.b; ctx.beginPath(); ctx.arc(ox+11,oy-8,26,0,TAU); ctx.fill(); }
  const drift=(state==='play'?t*speed:t)*0.15;
  ctx.fillStyle=C.hill; ctx.beginPath(); ctx.moveTo(-20,H);
  for(let x=-20;x<=W+20;x+=10) ctx.lineTo(x, 210+Math.sin((x+drift)*0.012)*20); ctx.lineTo(W+20,H); ctx.fill();
  ctx.fillStyle=C.cloud;
  for(let i=0;i<3;i++){ let cx2=((i*300 - (state==='play'?t*speed*0.3:t*0.4))%960+960)%960-80, cy=54+i*26;
    ctx.beginPath(); ctx.ellipse(cx2,cy,34,20,0,0,TAU); ctx.ellipse(cx2+28,cy+6,24,15,0,0,TAU); ctx.fill(); }
  ctx.fillStyle=C.gr; ctx.fillRect(-20,groundY+18,W+40,H-groundY);
  ctx.strokeStyle=shade(C.gr,0.85); ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(-20,groundY+18); ctx.lineTo(W+20,groundY+18); ctx.stroke();
  ctx.fillStyle=C.dash; const gd=(state==='play'?t*speed:t*1.4);
  for(let i=0;i<26;i++){ let x=((i*52 - gd)%1400+1400)%1400-40; ctx.fillRect(x,groundY+30,24,4); }
}
function grassTuft(x){ const y=H-6; ctx.fillStyle='#3a8f49'; ctx.beginPath(); ctx.ellipse(x,y+2,11,5,0,0,TAU); ctx.fill();
  ctx.strokeStyle='#4fa757'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.beginPath();
  ctx.moveTo(x,y); ctx.quadraticCurveTo(x-6,y-12,x-9,y-18);

// ---- dynamic weather from the player's real local weather (free, no key) ----
let weather='clear';
function wxCat(code){ if(code==null) return 'clear';
  if(code===0||code===1) return 'clear'; if(code===2||code===3) return 'clouds';
  if(code===45||code===48) return 'fog'; if((code>=71&&code<=77)||code===85||code===86) return 'snow';
  if(code>=95) return 'thunder'; if((code>=51&&code<=67)||(code>=80&&code<=82)) return 'rain'; return 'clouds'; }
function wxEmoji(){ return ({clear:'☀️',clouds:'☁️',rain:'🌧️',snow:'❄️',fog:'🌫️',thunder:'⛈️'})[weather]||''; }
async function initWeather(){
  const f=P.get('wx'); if(f){ weather=f; return; }               // debug override
  try{ const c=JSON.parse(localStorage.getItem('dinoWx')||'null'); if(c && (Date.now()-c.ts)<5400000){ weather=c.cat; return; } }catch(e){}
  try{
    const g=await fetch('https://ipapi.co/json/').then(r=>r.json());
    if(!g || g.latitude==null) return;
    const w=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+g.latitude+'&longitude='+g.longitude+'&current_weather=true').then(r=>r.json());
    const cat=wxCat(w && w.current_weather && w.current_weather.weathercode);
    weather=cat; try{ localStorage.setItem('dinoWx',JSON.stringify({cat,ts:Date.now()})); }catch(e){}
    if(cat!=='clear') toast(wxEmoji()+' real weather today!');
  }catch(e){ /* offline / blocked → stay clear, game unaffected */ }
}
function drawWeather(){
  if(weather==='clear') return;
  if(weather==='clouds'){ ctx.fillStyle='rgba(120,130,150,.10)'; ctx.fillRect(-20,-20,W+40,H+40); return; }
  if(weather==='fog'){ ctx.fillStyle='rgba(232,236,240,.30)'; ctx.fillRect(-20,-20,W+40,H+40); return; }
  if(weather==='rain'||weather==='thunder'){
    ctx.fillStyle='rgba(40,55,80,.18)'; ctx.fillRect(-20,-20,W+40,H+40);
    ctx.strokeStyle='rgba(185,205,235,.5)'; ctx.lineWidth=2; ctx.lineCap='round';
    for(let i=0;i<64;i++){ const x=(((i*67)+t*13)%(W+60))-30, y=(((i*97)+t*24)%(H+60))-30; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-4,y+13); ctx.stroke(); }
    if(weather==='thunder' && Math.floor(t/11)%43===0){ ctx.fillStyle='rgba(255,255,255,.55)'; ctx.fillRect(-20,-20,W+40,H+40); }
    return; }
  if(weather==='snow'){
    ctx.fillStyle='rgba(222,236,246,.12)'; ctx.fillRect(-20,-20,W+40,H+40);
    ctx.fillStyle='rgba(255,255,255,.92)';
    for(let i=0;i<52;i++){ const x=(((i*53)+Math.sin(t*0.02+i)*22)+W*2)%(W+20)-10, y=(((i*61)+t*1.7)%(H+40))-20; ctx.beginPath(); ctx.arc(x,y,1.6+(i%3)*0.7,0,TAU); ctx.fill(); }
    return; }
}

function hud(){

function frame(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(cardMode){ ctx.fillStyle='#0e1524'; ctx.fillRect(0,0,W,H); ctx.drawImage(buildCard(),(W-640)/2,0); requestAnimationFrame(frame); return; }
  if(!paused) update();
  if(shake>0.4) ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
  bg();
  for(const e of ents){ if(e.k==='bat') drawBat(ctx,e.x,e.y, t*0.3+e.f);
    else if(e.k==='rock') drawRock(e.x,e.y,e.tall);
    else if(e.k==='pebble'){ ctx.beginPath(); ctx.arc(e.x,e.y,6,0,TAU); ctx.fillStyle='#8b95a4'; ctx.fill(); ctx.strokeStyle=OUTLINE; ctx.lineWidth=2.4; ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.4)'; ctx.beginPath(); ctx.arc(e.x-2,e.y-2,1.8,0,TAU); ctx.fill(); }
    else drawBerry(ctx,e.x,e.y, e.k); }
  const blink=(t%240)<8?0:1;
  let mouthOpen=P.has('chomp')?1:(chomp>0?Math.min(1,chomp/7):((air&&state==='play')?0.5:0));
  if(state==='play' && (t%600)>556 && !air) mouthOpen=Math.max(mouthOpen,0.4);   // happy-pant quirk every ~10s
  const mh=t%240, hopY=(state==='menu'&&mh<20)?-Math.sin(mh/20*Math.PI)*12:0;    // idle hop on the title screen
  const koT=state==='over'?Math.min(1,(t-overAt)/16):0;                          // KO tip-over ease-in
  const flashing = invuln>0 && Math.floor(t/3)%2===0;
  if(flashing) ctx.globalAlpha=0.4;
  if(rainbow){ bodyHex=hslHex(t*2,0.62,0.6); plateHex=hslHex(t*2+50,0.55,0.75); }
  drawDino(ctx, dinoX, groundY+dy+hopY, SC, {t, flip:true, walk:(state==='play'&&!air), jump:air, shades:shadesOn, socks:socksOn, tailbow:tailbowOn, tailspike:tailspikeOn, armour:armourOn, scarf:scarfOn, cape:capeOn, glow:skinGlow, starry:skinStarry, hat:hatOn, open:(state==='over'?0:blink), mouth:(state==='over'?0:mouthOpen), ko:(state==='over'), rot:koT*0.14, tier:(state==='play'||state==='over')?runTier:0, sx:1+sq*0.6, sy:1-sq});
  ctx.globalAlpha=1;
  if(shield){ const pu=1+Math.sin(t*0.18)*0.04;
    ctx.save(); ctx.translate(dinoX-4, groundY+dy-92); ctx.scale(pu,pu);
    const rg=ctx.createRadialGradient(0,-8,12,0,0,118); rg.addColorStop(0,'rgba(120,225,255,.04)'); rg.addColorStop(.75,'rgba(120,225,255,.15)'); rg.addColorStop(1,'rgba(90,200,255,.30)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.ellipse(0,0,80,118,0,0,TAU); ctx.fill();
    ctx.save(); ctx.beginPath(); ctx.ellipse(0,0,80,118,0,0,TAU); ctx.clip(); ctx.strokeStyle='rgba(150,235,255,.14)'; ctx.lineWidth=1;
      for(let gx=-78;gx<=78;gx+=22){ ctx.beginPath(); ctx.moveTo(gx,-120); ctx.lineTo(gx,120); ctx.stroke(); }
      for(let gy=-116;gy<=116;gy+=22){ ctx.beginPath(); ctx.moveTo(-80,gy); ctx.lineTo(80,gy); ctx.stroke(); }
    ctx.restore();
    ctx.strokeStyle='rgba(70,210,255,.9)'; ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(0,0,80,118,0,0,TAU); ctx.stroke();
    ctx.strokeStyle='rgba(190,245,255,.55)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.ellipse(0,0,73,109,0,0,TAU); ctx.stroke();
    const sa=t*0.05; ctx.strokeStyle='rgba(255,255,255,.75)'; ctx.lineWidth=3.5; ctx.beginPath(); ctx.ellipse(0,0,80,118,0,sa,sa+0.6); ctx.stroke();
    for(let i=0;i<3;i++){ const a=t*0.045+i*TAU/3; ctx.fillStyle='rgba(225,250,255,.95)'; ctx.beginPath(); ctx.arc(Math.cos(a)*80, Math.sin(a)*118, 2.6, 0, TAU); ctx.fill(); }
    ctx.restore(); }
  if(magnet>0){ ctx.save(); ctx.translate(dinoX-4, groundY+dy-92); ctx.strokeStyle='rgba(74,163,255,.6)'; ctx.lineWidth=2.5;
    for(let k=0;k<2;k++){ const rr=34+k*26+((t*2)%26); ctx.globalAlpha=0.55*(1-((rr-34)/60)); ctx.beginPath(); ctx.arc(0,0,rr,0,TAU); ctx.stroke(); }
    ctx.globalAlpha=1; ctx.restore(); }
  if(boss) drawBoss();
  drawParticles();
  foreground(); speedLines(); drawWeather();
  if(hitFlash>0){ ctx.fillStyle='rgba(229,56,78,'+(hitFlash/40)+')'; ctx.fillRect(-20,-20,W+40,H+40); hitFlash--; }
  if(mileFlash>0){ ctx.fillStyle='rgba(255,245,200,'+(mileFlash/40)+')'; ctx.fillRect(-20,-20,W+40,H+40); }
  hud();
  if(state==='menu') missionPanel();
  if(state==='over'){ const beat=challenge>0 && lastScore>challenge;
    const medal=lastScore>=500?'🥇':lastScore>=250?'🥈':lastScore>=100?'🥉':'';
    const li=levelInfo(xp), gap=hi-lastScore, soClose=!newBest && hi>0 && lastScore>0 && gap<=Math.max(15,hi*0.12);
    const foot=(t-overAt<=52)?'saving score…':(soClose?('😤 SO close — '+(gap+1)+' more! Tap for one more'):'Tap to retry · ⚔️ Challenge below');
    bigPanel([[(medal?medal+' ':'')+(newBest?'NEW BEST!':(beat?'You beat '+challenge+'!':'Game Over')),'bold 24px',(newBest||beat||medal)?'#ffe08a':'#fff'],
      ['Score '+lastScore+' · Best '+hi,'500 16px','#dfe'],
      ['🍓 +'+runBerries+(luckyBonus?' · 🎁 +'+luckyBonus+' lucky!':'')+' earned · '+wallet+' saved','500 13px','#ffd27a'],
      ['⭐ Lv '+li.lvl+' · 🏃 Run #'+stats.runs+' · ✨ x'+stats.bestCombo+' · 📊 Closet','500 11px','#a9bcd0']], foot); }
  if(paused && state==='play') panel([['⏸ Paused','bold 26px'],['tap to resume · P','bold 15px','#bfe3ff']]);
  requestAnimationFrame(frame);
}

// ------------------------------------------------ share --
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200); }

function buildCard(){
  const c=document.createElement('canvas'); c.width=640; c.height=360; const x=c.getContext('2d');
  const skin=SKINS.find(s=>s.id===equip.skin)||SKINS[0];
  const glow=(RARITY[skin.rarity]||RARITY.common).c;
  const g=x.createLinearGradient(0,0,0,360); g.addColorStop(0,'#bfe0f2'); g.addColorStop(.6,'#d7ecdf'); g.addColorStop(1,'#c2d6cf');
  x.fillStyle=g; x.fillRect(0,0,640,360);
  x.fillStyle='#ffe27a'; x.beginPath(); x.arc(590,50,25,0,TAU); x.fill();
  x.fillStyle='rgba(255,255,255,.82)'; [[300,40],[470,58]].forEach(([cx,cy])=>{ x.beginPath(); x.ellipse(cx,cy,30,17,0,0,TAU); x.ellipse(cx+22,cy+6,19,12,0,0,TAU); x.fill(); });
  x.fillStyle='#a9d6ba'; x.beginPath(); x.moveTo(0,360); for(let i=0;i<=640;i+=10) x.lineTo(i,262+Math.sin(i*0.02)*13); x.lineTo(640,360); x.fill();
  x.fillStyle='#e7d3a0'; x.fillRect(0,308,640,52); x.strokeStyle='#c9ad6a'; x.lineWidth=4; x.beginPath(); x.moveTo(0,308); x.lineTo(640,308); x.stroke();
  // ---- hero dino, spotlit, showing off its outfit ----
  const cx=178, base=306;
  const sp=x.createRadialGradient(cx,150,8,cx,196,190); sp.addColorStop(0,glow+'55'); sp.addColorStop(.6,glow+'1e'); sp.addColorStop(1,glow+'00');
  x.fillStyle=sp; x.fillRect(0,0,372,340);
  x.fillStyle='rgba(0,0,0,.15)'; x.beginPath(); x.ellipse(cx,base+3,98,17,0,0,TAU); x.fill();
  drawBerry(x,300,150); drawBerry(x,58,176);
  drawDino(x,cx,base,1.44,{t:12, flip:true, walk:false, shades:shadesOn, socks:socksOn, tailbow:tailbowOn, tailspike:tailspikeOn, armour:armourOn, scarf:scarfOn, cape:capeOn, glow:!!skin.glow, starry:!!skin.starry, hat:hatOn, open:1});
  // ---- right column ----
  x.textAlign='left';
  x.fillStyle='#26383f'; x.font='bold 21px system-ui,sans-serif'; x.fillText('🍓 Strawberry Dash', 332, 44);
  x.fillStyle='#1f6d4f'; x.font='bold 20px system-ui,sans-serif'; x.fillText((pName||'My dino').toUpperCase(), 334, 80);
  // outfit chips (skin + hat + gear), coloured by rarity
  const chips=[{t:skin.name,r:skin.rarity}];
  const hat=HATS.find(h=>h.id===equip.hat); if(hat && hat.id!=='none') chips.push({t:hat.name,r:hat.rarity});
  GEAR.forEach(gi=>{ if(equip.gear && equip.gear[gi.id]) chips.push({t:gi.name,r:gi.rarity}); });
  x.font='bold 12px system-ui,sans-serif'; let px=334, py=94;
  chips.slice(0,6).forEach(ch=>{ const w=x.measureText(ch.t).width+18; if(px+w>630){ px=334; py+=25; }
    const col=(RARITY[ch.r]||RARITY.common).c;
    x.beginPath(); x.roundRect(px,py,w,20,10); x.fillStyle=col+'26'; x.fill(); x.strokeStyle=col; x.lineWidth=1.5; x.stroke();
    x.fillStyle='#1f2f39'; x.fillText(ch.t, px+9, py+14); px+=w+7; });
  // score
  x.fillStyle='#e5384e'; x.font='bold 74px system-ui,sans-serif'; x.fillText(String(lastScore||hi), 332, 228);
  x.fillStyle='#26383f'; x.font='bold 20px system-ui,sans-serif'; x.fillText('Best '+hi, 334, 256);
  x.fillStyle='#3a4a50'; x.font='600 16px system-ui,sans-serif'; x.fillText('Can you beat my dino? 👉', 334, 284);
  x.fillStyle='#2b6cff'; x.font='bold 16px system-ui,sans-serif'; x.fillText('velesnitski.github.io/dino', 334, 320);
  x.strokeStyle='rgba(30,50,60,.18)'; x.lineWidth=2; x.strokeRect(1,1,638,358);
  return c;
}

// --- share: pre-rendered card cache (navigator.share must fire inside the click gesture,
//     so the PNG has to be ready BEFORE the tap — an async toBlob inside the handler loses activation on iOS)
let cardCache={key:'',blob:null,file:null};
function cardKey(){ return [lastScore,hi,pName,equip.skin,equip.hat,JSON.stringify(equip.gear||{})].join('|'); }
function prepareCard(){ return new Promise(res=>{ const k=cardKey();
  if(cardCache.key===k && cardCache.blob) return res(cardCache);
  buildCard().toBlob(b=>{ cardCache={key:k, blob:b, file:(b&&typeof File!=='undefined')?new File([b],'strawberry-dash.png',{type:'image/png'}):null}; res(cardCache); },'image/png'); }); }
function shareBits(){ const sc=lastScore||hi;
  const url=GAME_URL+(sc?('#c='+(hi||sc)):'');
  const text=sc?((pName?pName+' ':'I ')+'scored '+sc+' in Strawberry Dash 🦕🍓 (best '+hi+')! Can you beat me?')
              :'Meet my dino in Strawberry Dash 🦕🍓!';
  return {url,text}; }
async function shareResult(){ initAudio();
  const {url,text}=shareBits();
  const c=(cardCache.key===cardKey() && cardCache.blob)?cardCache:await prepareCard();   // warm 99% of the time
  try{
    if(c.file && navigator.canShare && navigator.canShare({files:[c.file]})){
      await navigator.share({files:[c.file], title:'Strawberry Dash', text:text+' '+url});   // link rides inside the text — iOS drops `url` next to `files`
      return; }
    if(navigator.share){ await navigator.share({title:'Strawberry Dash', text, url}); return; }
  }catch(e){ if(e && e.name==='AbortError') return; }
  openShareSheet(c);   // desktop / unsupported: deliberate picker instead of a surprise download
}
function openShareSheet(c){
  const img=document.getElementById('shareImg');
  if(c.blob){ if(img.dataset.u) URL.revokeObjectURL(img.dataset.u); const u=URL.createObjectURL(c.blob); img.src=u; img.dataset.u=u; }
  document.getElementById('shCopyImg').style.display=(navigator.clipboard && navigator.clipboard.write && window.ClipboardItem)?'':'none';
  document.getElementById('shareModal').classList.add('show'); if(state==='play') paused=true;
}

async function shareLink(){ initAudio();
  const text='Play Strawberry Dash 🦕🍓';
  try{ if(navigator.share){ await navigator.share({title:'Strawberry Dash',text,url:GAME_URL}); return; } }
  catch(e){ if(e && e.name==='AbortError') return; }
  try{ await navigator.clipboard.writeText(GAME_URL); toast('Game link copied! 🔗'); }
  catch(e){ toast(GAME_URL); }
}

stage.addEventListener('touchstart', e=>{ e.preventDefault(); action(); }, {passive:false});
addEventListener('keydown', e=>{ if((e.target&&e.target.tagName==='INPUT') || document.getElementById('closetModal').classList.contains('show') || document.getElementById('shareModal').classList.contains('show')) return;
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); action(); } else if(e.code==='KeyP'||e.code==='Escape'){ if(state==='play') paused=!paused; } });

const mBtn=document.getElementById('mute');

mBtn.onclick=()=>{ muted=!muted; localStorage.setItem('dinoMute',muted?'1':'0'); paintMute(); initAudio(); };
document.getElementById('share').onclick=shareResult;

  try{ await navigator.clipboard.writeText(text+' '+url); toast('Link copied! 🔗'); }catch(e){ toast(url); } };
document.getElementById('shCopyImg').onclick=async()=>{ try{ await navigator.clipboard.write([new ClipboardItem({'image/png':cardCache.blob})]); toast('Card copied — paste it anywhere! 🖼'); }
  catch(e){ toast('Copy not supported here — use Save ⬇️'); } };
document.getElementById('shSave').onclick=()=>{ if(!cardCache.blob) return; const a=document.createElement('a'); a.href=URL.createObjectURL(cardCache.blob); a.download='strawberry-dash.png'; a.click(); toast('Card saved! ⬇️'); };
document.querySelectorAll('.modalTabs .tab').forEach(tb=>tb.onclick=()=>{ closetTab=tb.dataset.tab; document.querySelectorAll('.modalTabs .tab').forEach(x=>x.classList.toggle('on',x===tb)); renderShop(); });
applyEquip(); initMissions(); initWeather();
if(!cardMode){ claimDaily(); if(dailyBanner){ confetti(); toast('🎁 Daily reward · Day '+dailyBanner.day+' · +'+dailyBanner.bonus+'🍓'); } }
checkAchv();   // backfill already-earned badges silently
if(!cardMode) setTimeout(prepareCard,300);   // warm the share-card cache at boot
const nameEl=document.getElementById('pname'); nameEl.value=pName;
nameEl.oninput=e=>{ pName=e.target.value.slice(0,12); localStorage.setItem('dinoName',pName); clearTimeout(nameEl._pc); nameEl._pc=setTimeout(prepareCard,500); };
paintMute();
if(demo) state='play';
if(P.has('fx')){ confetti(); sparkle(320,180); pop('+25',320,168,'#e5384e'); pop('x5',258,120,'#ffb300'); }
if(P.has('closet')){ if(P.has('rich')){ wallet=800; } openCloset(); const tb=P.get('tab'); if(tb){ closetTab=tb; document.querySelectorAll('.modalTabs .tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===tb)); renderShop(); } }
if(P.get('wear')){ equip.hat=P.get('wear'); applyEquip(); }
if(P.get('gear')){ if(!equip.gear) equip.gear={}; P.get('gear').split(',').forEach(id=>equip.gear[id]=true); applyEquip(); }
if(P.get('skin')){ equip.skin=P.get('skin'); applyEquip(); }
if(P.has('boss')){ state='play'; const bt=P.get('boss'), worm=(bt==='worm'), mega=(bt==='mega');
  if(bt==='crab'||bt==='tortoise'||bt==='crow'){ boss=makeBoss(bt, bt==='tortoise'?1:3, false); boss.x=W-200; boss.phase=bt==='tortoise'?'stroll':(bt==='crab'?'shuffle':'hover'); if(P.has('nap')&&bt==='tortoise') boss.phase='nap'; if(P.has('guard')&&bt==='crab'){ boss.phase='guard'; } if(P.has('zoom')&&bt==='tortoise'){ boss.phase='zoom'; boss.bounces=3; } if(P.has('dazed')&&bt==='crow'){ boss.phase='dazed'; boss.x=W-320; boss.y=groundY-20; boss.hp=2; } }
  else boss = worm ? {type:'worm',hp:3,hp0:3,mega:false,hx:dinoX+40,hy:groundY-85,hy0:groundY+30,startX:dinoX+150,endX:dinoX-150,trail:[],phase:'erupt',pt:36,inv:0,age:0}
              : {type:'bat',hp:mega?5:3,hp0:mega?5:3,mega,x:560,y:groundY-110,hy:groundY-110,phase:'hover',pt:0,inv:0,age:0}; }
if(P.has('seed')) localStorage.setItem('dinoBoard', JSON.stringify([{name:'MILA',score:412},{name:'LEO',score:388},{name:'you',score:240},{name:'MILA',score:150},{name:'LEO',score:96}]));
if(P.get('tier')) runTier=Math.min(4,+P.get('tier')||0);
if(P.has('share')){ lastScore=lastScore||248; prepareCard().then(c=>openShareSheet(c)); }
if(P.has('ko')){ state='over'; overAt=t-60; lastScore=123; }
requestAnimationFrame(frame);
