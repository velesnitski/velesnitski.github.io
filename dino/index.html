<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Strawberry Dash 🦕🍓</title>
<meta name="description" content="Help the dino eat strawberries and dodge the bats — a one-button jumping game for kids.">
<meta name="theme-color" content="#c2d6cf">
<link rel="shortcut icon" type="image/x-icon" href="../favicons/favicon.ico">
<meta property="og:type" content="website">
<meta property="og:title" content="Strawberry Dash 🦕🍓">
<meta property="og:description" content="Eat strawberries, dodge bats — a one-button dino game.">
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:#0e1524;color:#e8eef5;display:flex;flex-direction:column;align-items:center;
       min-height:100%;text-align:center;-webkit-tap-highlight-color:transparent}
  h1{font-weight:800;margin:18px 0 2px;font-size:22px}
  .sub{opacity:.6;font-size:13px;margin-bottom:12px}
  .stage{border-radius:16px;box-shadow:0 18px 60px rgba(0,0,0,.5);overflow:hidden;
         width:min(760px,96vw);touch-action:manipulation;cursor:pointer;user-select:none}
  canvas{display:block;width:100%;height:auto}
  .panel{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center;margin:14px;
         background:#19202e;padding:10px 16px;border-radius:14px;max-width:96vw}
  .panel label{font-size:11px;display:flex;flex-direction:column;gap:5px;align-items:center;opacity:.85}
  button{background:#2b6cff;border:0;color:#fff;padding:8px 14px;border-radius:9px;font-size:13px;cursor:pointer;font-weight:600}
  button.alt{background:#2a3344}
  button.on{background:#22a05a}
  input[type=color]{width:40px;height:26px;border:0;background:none;cursor:pointer;padding:0}
  .foot{opacity:.4;font-size:12px;margin:6px 16px 30px;line-height:1.6}
  a{color:#7fb0ff}
  #pname{width:74px;height:26px;border-radius:6px;border:0;padding:0 6px;text-align:center;font-weight:600}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(18px);
    background:#22a05a;color:#fff;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;
    opacity:0;pointer-events:none;transition:.3s;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <h1>🍓 Strawberry Dash</h1>
  <div class="sub">Eat 🍓, dodge 🦇 · tap / <b>space</b> to jump · tap again in the air to <b>dive</b></div>

  <div class="stage" id="stage"><canvas id="game" width="760" height="360"></canvas></div>

  <div class="panel">
    <button id="share">📤 Share score</button>
    <button class="alt" id="link">🔗 Game link</button>
    <button class="alt" id="mute">🔊 Sound</button>
    <button class="alt" id="shades">😎 Shades</button>
    <button class="alt" id="hat">👒 Panama</button>
    <label>Name<input type="text" id="pname" maxlength="12" placeholder="you"></label>
    <label>Body<input type="color" id="cBody" value="#66b49a"></label>
    <label>Plates<input type="color" id="cPlate" value="#9ad1bd"></label>
    <label>Belly<input type="color" id="cBelly" value="#f3e6c6"></label>
  </div>

  <div class="toast" id="toast"></div>

  <div class="foot">Made for the kids · works on phones &amp; tablets · <a href="../">home</a></div>

<script>
const TAU=Math.PI*2;
function shade(hex,f){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const c=v=>Math.max(0,Math.min(255,Math.round(v)));
  return '#'+((1<<24)+(c(r*f)<<16)+(c(g*f)<<8)+c(b*f)).toString(16).slice(1); }
let bodyHex="#66b49a", plateHex="#9ad1bd", bellyHex="#f3e6c6";
const OUTLINE="#26383f", olw=5, BAND="#e0533b";

// ------------------------------------------------ dino (faces right when flip) --
function drawDino(ctx, cx, footY, s, o){
  o=o||{}; o.t=o.t||0;
  const BODY=bodyHex, DK=shade(bodyHex,0.80), CREAM=bellyHex, PLATE=plateHex;
  const open=('open'in o)?o.open:1;
  const hipY=-30;
  const legs=[ {x:-2,far:1},{x:34,far:1},{x:-18,far:0},{x:20,far:0} ];
  legs.forEach((L,i)=>{ let fx=L.x, fy=L.far?-1:1, lift=0;
    if(o.jump){ fy=-18; fx=L.x*0.7; }
    else if(o.walk){ const ph=o.t*0.28 + (i%2?Math.PI:0) + (L.far?Math.PI:0);
      fx=L.x+Math.cos(ph)*6; lift=Math.max(0,Math.sin(ph))*8; fy=(L.far?-1:1)-lift; }
    L.fx=fx; L.fy=fy; });
  let bob = o.jump? -8 : (o.walk? -Math.abs(Math.sin(o.t*0.56))*2 : Math.sin(o.t*0.05)*1.5);

  ctx.save(); ctx.translate(cx, footY+bob); ctx.scale((o.flip?-s:s)*(o.sx||1), s*(o.sy||1));

  ctx.fillStyle='rgba(30,55,60,.28)';
  ctx.beginPath(); ctx.ellipse(10,8-bob,86,14,0,0,TAU); ctx.fill();

  const legCap=(L,w,fill)=>{ ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(L.x,hipY); ctx.lineTo(L.fx,L.fy);
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=w+olw*2; ctx.stroke(); ctx.strokeStyle=fill; ctx.lineWidth=w; ctx.stroke(); };
  legs.filter(L=>L.far).forEach(L=>legCap(L,22,DK));

  const tailPath=()=>{ ctx.moveTo(46,-50);
    ctx.bezierCurveTo(104,-44,120,-80,102,-106); ctx.bezierCurveTo(96,-118,78,-114,84,-98);
    ctx.bezierCurveTo(88,-84,66,-70,46,-86); ctx.closePath(); };
  const parts=(mode)=>{
    const el=(x,y,rx,ry)=>{ ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,TAU);
      if(!mode){ ctx.lineJoin='round'; ctx.lineWidth=olw*2; ctx.strokeStyle=OUTLINE; ctx.stroke(); ctx.fillStyle=OUTLINE; } else ctx.fillStyle=BODY; ctx.fill(); };
    const cap=(x1,y1,x2,y2,w)=>{ ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      if(!mode){ ctx.lineWidth=w+olw*2; ctx.strokeStyle=OUTLINE; } else { ctx.lineWidth=w; ctx.strokeStyle=BODY; } ctx.stroke(); };
    legs.filter(L=>!L.far).forEach(L=>{ ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(L.x,hipY); ctx.lineTo(L.fx,L.fy);
      if(!mode){ ctx.lineWidth=24+olw*2; ctx.strokeStyle=OUTLINE; } else { ctx.lineWidth=24; ctx.strokeStyle=BODY; } ctx.stroke(); });
    ctx.beginPath(); tailPath();
    if(!mode){ ctx.lineJoin='round'; ctx.lineWidth=olw*2; ctx.strokeStyle=OUTLINE; ctx.stroke(); ctx.fillStyle=OUTLINE; } else ctx.fillStyle=BODY; ctx.fill();
    el(14,-66,56,44); cap(-22,-80,-52,-122,46);
    el(-62,-144,32,30); el(-83,-146,15,13); el(-42,-160,9,8); el(-40,-136,8,7);
  };
  parts(0); parts(1);

  ctx.save(); ctx.beginPath(); ctx.ellipse(14,-66,56,44,0,0,TAU); ctx.clip();
    ctx.fillStyle=shade(bodyHex,0.9); ctx.beginPath(); ctx.ellipse(20,-30,54,22,0,0,TAU); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.10)'; ctx.beginPath(); ctx.ellipse(0,-98,40,16,0,0,TAU); ctx.fill();
  ctx.restore();

  ctx.lineCap='round'; ctx.strokeStyle=CREAM; ctx.lineWidth=15;
  ctx.beginPath(); ctx.moveTo(-66,-124); ctx.quadraticCurveTo(-46,-92,-30,-64); ctx.stroke();
  ctx.save(); ctx.beginPath(); ctx.ellipse(14,-66,56,44,0,0,TAU); ctx.clip();
    ctx.fillStyle=CREAM; ctx.beginPath(); ctx.ellipse(-16,-44,32,22,0,0,TAU); ctx.fill(); ctx.restore();

  const plates=[[-30,-92,8,7],[-14,-104,11,9],[2,-111,12,10],[20,-112,12,10],[38,-108,11,9],[54,-99,10,8],[68,-87,8,6]];
  plates.forEach(([x,y,rx,ry])=>{ ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,TAU);
    ctx.fillStyle=PLATE; ctx.fill(); ctx.lineWidth=2.4; ctx.strokeStyle=shade(plateHex,0.72); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.beginPath(); ctx.ellipse(x-2,y-2,rx*0.4,ry*0.4,0,0,TAU); ctx.fill(); });

  ctx.save(); ctx.beginPath(); ctx.ellipse(-62,-144,32,30,0,0,TAU); ctx.clip();
    ctx.fillStyle='rgba(255,255,255,.12)'; ctx.beginPath(); ctx.ellipse(-70,-160,18,10,-.3,0,TAU); ctx.fill(); ctx.restore();

  if(o.shades){
    ctx.fillStyle='#17252a'; ctx.strokeStyle=OUTLINE; ctx.lineWidth=3.4;
    ctx.beginPath(); ctx.ellipse(-71,-147,12,9,-.14,0,TAU); ctx.fill(); ctx.stroke();
    ctx.lineWidth=3.4; ctx.beginPath(); ctx.moveTo(-60,-152); ctx.lineTo(-46,-155); ctx.stroke();
    ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-83,-148); ctx.lineTo(-85,-149); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=2.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-77,-150); ctx.lineTo(-69,-145); ctx.stroke();
  } else if(open<0.2){
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(-71,-146,7,Math.PI*1.15,Math.PI*1.85); ctx.stroke();
  } else {
    ctx.fillStyle='#182226'; ctx.beginPath(); ctx.ellipse(-71,-148,5.4,6.2*open,0,0,TAU); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(-73,-150,1.9,2,0,0,TAU); ctx.fill();
  }
  ctx.fillStyle=OUTLINE; ctx.beginPath(); ctx.ellipse(-91,-149,2,2.4,0,0,TAU); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=2.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-90,-138); ctx.quadraticCurveTo(-82,-133,-74,-137); ctx.stroke();

  if(o.hat){ const hx=-62;
    const sg=ctx.createLinearGradient(0,-208,0,-166); sg.addColorStop(0,'#f8e6a6'); sg.addColorStop(1,'#e6c778');
    ctx.beginPath(); ctx.moveTo(hx-30,-172); ctx.bezierCurveTo(hx-26,-206,hx+26,-206,hx+30,-172);
    ctx.lineJoin='round'; ctx.lineWidth=olw*2; ctx.strokeStyle=OUTLINE; ctx.stroke(); ctx.fillStyle=sg; ctx.fill();
    ctx.save(); ctx.beginPath(); ctx.moveTo(hx-30,-172); ctx.bezierCurveTo(hx-26,-206,hx+26,-206,hx+30,-172); ctx.closePath(); ctx.clip();
      ctx.fillStyle=BAND; ctx.fillRect(hx-34,-192,68,11); ctx.restore();
    ctx.beginPath(); ctx.ellipse(hx,-170,44,12,0,0,TAU);
    ctx.lineWidth=olw*2; ctx.strokeStyle=OUTLINE; ctx.stroke(); ctx.fillStyle=sg; ctx.fill();
  }

  ctx.strokeStyle=OUTLINE; ctx.lineWidth=2.4; ctx.lineCap='round';
  legs.filter(L=>!L.far).forEach(L=>{ for(let d=-1;d<=1;d+=2){ ctx.beginPath(); ctx.moveTo(L.fx+d*5,L.fy-2); ctx.lineTo(L.fx+d*5,L.fy+7); ctx.stroke(); } });

  ctx.restore();
}

// ------------------------------------------------ props --
function drawBerry(ctx,x,y,v){ ctx.save(); ctx.translate(x,y); const r=13;
  const gold=(v==='gold'||v===true), mag=(v==='mag');
  if(gold||mag){ ctx.fillStyle=(mag?'rgba(90,180,255,':'rgba(255,220,90,')+(0.3+0.14*Math.sin(t*0.2))+')'; ctx.beginPath(); ctx.arc(0,0,r+9,0,TAU); ctx.fill(); }
  ctx.beginPath(); ctx.moveTo(0,r*1.05);
  ctx.bezierCurveTo(-r*1.15,r*0.35,-r*1.02,-r*0.7,0,-r*0.5);
  ctx.bezierCurveTo(r*1.02,-r*0.7,r*1.15,r*0.35,0,r*1.05); ctx.closePath();
  ctx.fillStyle=gold?'#ffcf3a':mag?'#4aa3ff':'#e5384e'; ctx.strokeStyle=gold?'#a9761a':mag?'#1c5aa8':'#7a1a2a'; ctx.lineWidth=3; ctx.stroke(); ctx.fill();
  ctx.fillStyle=gold?'#9a6b1a':mag?'#dff0ff':'#ffe08a';
  [[-5,0],[4,-1],[0,5],[-3,8],[6,6],[-7,-4],[7,-4]].forEach(([sx,sy])=>{ ctx.save(); ctx.translate(sx,sy); ctx.rotate(0.5);
    ctx.beginPath(); ctx.ellipse(0,0,1.3,2.2,0,0,TAU); ctx.fill(); ctx.restore(); });
  ctx.fillStyle='rgba(255,255,255,.35)'; ctx.beginPath(); ctx.ellipse(-5,-2,3,4,-.4,0,TAU); ctx.fill();
  ctx.fillStyle='#4bae5a'; ctx.strokeStyle='#2e7d3c'; ctx.lineWidth=2;
  for(let i=-2;i<=2;i++){ ctx.save(); ctx.rotate(i*0.52); ctx.beginPath();
    ctx.moveTo(0,-r*0.5); ctx.quadraticCurveTo(3,-r*0.5-7,0,-r*0.5-11); ctx.quadraticCurveTo(-3,-r*0.5-7,0,-r*0.5); ctx.fill(); ctx.restore(); }
  ctx.strokeStyle='#2e7d3c'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(0,-r*0.5); ctx.lineTo(0,-r*0.5-6); ctx.stroke();
  ctx.restore(); }

function drawBat(ctx,x,y,ph){ ctx.save(); ctx.translate(x,y);
  const flap=Math.sin(ph); const WC='#6a5a8f', BC='#463a63', OL='#241d33';
  const wing=(sd)=>{ ctx.beginPath(); ctx.moveTo(0,-1);
    ctx.quadraticCurveTo(sd*12,-10-flap*7, sd*24,-6-flap*5);
    ctx.quadraticCurveTo(sd*18,-2, sd*22,4-flap*2);
    ctx.quadraticCurveTo(sd*15,1, sd*16,8-flap);
    ctx.quadraticCurveTo(sd*10,3, sd*7,9); ctx.quadraticCurveTo(sd*5,3, 0,4); ctx.closePath();
    ctx.fillStyle=WC; ctx.strokeStyle=OL; ctx.lineWidth=2.4; ctx.stroke(); ctx.fill(); };
  wing(-1); wing(1);
  ctx.beginPath(); ctx.ellipse(0,1,8,9,0,0,TAU); ctx.fillStyle=BC; ctx.strokeStyle=OL; ctx.lineWidth=2.4; ctx.stroke(); ctx.fill();
  ctx.fillStyle=BC; ctx.strokeStyle=OL; ctx.lineWidth=2;
  [-4,4].forEach(ex=>{ ctx.beginPath(); ctx.moveTo(ex-3,-5); ctx.lineTo(ex,-13); ctx.lineTo(ex+3,-5); ctx.closePath(); ctx.stroke(); ctx.fill(); });
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-3,0,2.1,0,TAU); ctx.arc(3,0,2.1,0,TAU); ctx.fill();
  ctx.fillStyle='#e5384e'; ctx.beginPath(); ctx.arc(-3,0,1,0,TAU); ctx.arc(3,0,1,0,TAU); ctx.fill();
  ctx.restore(); }

// ------------------------------------------------ audio (synth) --
let AC=null, muted=(localStorage.getItem('dinoMute')==='1');
function initAudio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(AC&&AC.state==='suspended') AC.resume(); }
function beep(f,dur,type,vol,to){ if(!AC||muted) return; const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,AC.currentTime);
  if(to) o.frequency.exponentialRampToValueAtTime(to,AC.currentTime+dur);
  g.gain.setValueAtTime(vol,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
  o.connect(g).connect(AC.destination); o.start(); o.stop(AC.currentTime+dur); }
const sfxJump =()=>beep(320,0.14,'square',0.05,660);
const sfxBerry=(n=0)=>{ const p=Math.pow(1.06,n); beep(680*p,0.08,'triangle',0.06,900*p); setTimeout(()=>beep(1020*p,0.10,'triangle',0.06,1180*p),70); };
const sfxWin=()=>{ [0,120,240,380].forEach((d,i)=>setTimeout(()=>beep(520+i*150,0.14,'square',0.05,660+i*170),d)); };
const sfxHit  =()=>{ beep(400,0.35,'sawtooth',0.07,70); setTimeout(()=>beep(160,0.3,'square',0.05,60),60); };
const sfxStart=()=>{ beep(520,0.09,'square',0.05,780); setTimeout(()=>beep(780,0.11,'square',0.05,1040),90); };
const sfxPower=()=>{ beep(700,0.10,'sine',0.06,1250); setTimeout(()=>beep(1050,0.12,'sine',0.06,1550),60); };
const sfxShield=()=>{ beep(300,0.20,'square',0.06,110); };
const sfxDive=()=>{ beep(520,0.12,'sawtooth',0.05,150); };
const sfxLand=()=>{ beep(130,0.14,'square',0.06,60); };

// ------------------------------------------------ game --
const cv=document.getElementById('game'), ctx=cv.getContext('2d'), W=760, H=360;
const DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));
cv.width=W*DPR; cv.height=H*DPR;
const groundY=286, dinoX=168, SC=1.02;
let shadesOn=false, hatOn=false, t=0;
let state='menu', score=0, hi=+(localStorage.getItem('dinoHi')||0), speed=4;
let ents=[], spawnT=50, dy=0, vel=0, air=false, hitFlash=0, lastScore=0, challengePassed=false;
let coyote=0, jumpBuf=0, sq=0, combo=0, comboTimer=0, shake=0, newBest=false, parts=[], pops=[], shield=false, invuln=0, magnet=0, justPlacedIdx=-1, diving=false;
const P=new URLSearchParams(location.hash.replace(/^#/,''));
const demo=P.has('demo'), cardMode=P.has('card');
let challenge=Math.max(0,Math.floor(+P.get('c')||0));
let pName=(localStorage.getItem('dinoName')||'').slice(0,12);
if(cardMode){ lastScore=248; hi=248; }
const GAME_URL=location.origin+location.pathname;

function reset(){ score=0; speed=4.2; ents=[]; spawnT=46; dy=0; vel=0; air=false; hitFlash=0; challengePassed=false;
  coyote=0; jumpBuf=0; sq=0; combo=0; comboTimer=0; shake=0; parts=[]; pops=[]; shield=false; invuln=0; magnet=0; justPlacedIdx=-1; diving=false; }
function start(){ reset(); state='play'; sfxStart(); }
function over(){ state='over'; hitFlash=14; shake=12; combo=0; sfxHit(); hitBurst(dinoX,groundY+dy-64);
  lastScore=Math.floor(score); newBest=lastScore>hi; hi=Math.max(hi,lastScore); localStorage.setItem('dinoHi',hi);
  if(lastScore>0) recordScore(lastScore); else justPlacedIdx=-1;
  if(newBest){ confetti(); sfxWin(); } }
function action(){ initAudio();
  if(state==='menu') start();
  else if(state==='play') jumpBuf=8;
  else if(state==='over') start(); }

function spawn(){
  const base=Math.max(46, 96-speed*4)+Math.random()*34, r=Math.random();
  if(r<0.07){ ents.push({k:'gold', x:W+40, y:groundY-84-Math.random()*54, got:false}); return base; }
  if(r<0.13){ ents.push({k:'mag', x:W+40, y:groundY-84-Math.random()*54, got:false}); return base; }
  if(r<0.55){ ents.push({k:'bat', x:W+40, y:groundY-30-Math.random()*46, f:Math.random()*TAU}); return base; }
  if(r<0.69){ const n=5, baseY=groundY-72, amp=60+Math.random()*30;   // arc of berries tracing a jump
    for(let i=0;i<n;i++){ const f=i/(n-1); ents.push({k:'berry', x:W+40+i*40, y:baseY-Math.sin(f*Math.PI)*amp, got:false}); }
    return base+28; }
  ents.push({k:'berry', x:W+40, y:groundY-72-Math.random()*74, got:false}); return base; }

function update(){
  t++;
  sq*=0.82;
  updateParticles();
  if(demo){ if(!ents.length){ ents=[{k:'bat',x:680,y:groundY-40,f:0},{k:'gold',x:300,y:groundY-104,got:false},{k:'mag',x:224,y:groundY-104,got:false}];
    for(let i=0;i<5;i++){ const f=i/4; ents.push({k:'berry',x:440+i*40,y:groundY-72-Math.sin(f*Math.PI)*72,got:false}); } shield=true; magnet=260; } return; }
  if(shake>0) shake*=0.86;
  if(state!=='play') return;
  speed=Math.min(9.2, speed+0.0016);
  score+=speed*0.02;
  if(comboTimer>0 && --comboTimer===0) combo=0;
  if(challenge>0 && !challengePassed && score>challenge){ challengePassed=true; toast('🔥 Passed '+challenge+'!'); sfxBerry(2); }
  // jump: coyote time + input buffer (forgiving timing)
  if(!air) coyote=6; else if(coyote>0) coyote--;
  if(jumpBuf>0) jumpBuf--;
  if(jumpBuf>0 && coyote>0 && !air){ vel=-15.6; air=true; coyote=0; jumpBuf=0; sq=-0.14; sfxJump(); }
  else if(jumpBuf>0 && air && !diving){ diving=true; vel=Math.max(vel,20); jumpBuf=0; sq=-0.2; sfxDive(); }
  if(air){ vel+=0.86; dy+=vel; if(dy>=0){ dy=0; vel=0; air=false;
    if(diving){ diving=false; sq=0.3; diveSlam(dinoX); shake=7; sfxLand(); } else { sq=0.22; dust(dinoX); } } }
  spawnT--; if(spawnT<=0) spawnT=spawn();
  if(invuln>0) invuln--; if(magnet>0) magnet--;
  const dcx=dinoX, dcy=groundY+dy-64;
  for(const e of ents){ e.x-=speed;
    if(magnet>0 && (e.k==='berry'||e.k==='gold') && !e.got){ const mx=dcx-e.x, my=dcy-e.y; if(mx*mx+my*my<300*300){ e.x+=mx*0.16; e.y+=my*0.16; } }
    if((e.k==='berry'||e.k==='gold'||e.k==='mag')&&!e.got){ const dx=e.x-dcx, dyy=e.y-dcy; if(dx*dx+dyy*dyy<52*52){ e.got=true;
      if(e.k==='gold'){ score+=15; goldSparkle(e.x,e.y); sfxPower();
        if(!shield){ shield=true; pop('🛡 SHIELD!',dcx,dcy-74,'#39d0ff'); } else pop('+15',e.x,e.y-10,'#ffcf3a'); }
      else if(e.k==='mag'){ score+=10; magnet=300; goldSparkle(e.x,e.y); sfxPower(); pop('🧲 MAGNET!',dcx,dcy-74,'#4aa3ff'); }
      else { combo++; comboTimer=200; const pts=5*Math.min(combo,5); score+=pts;
        sparkle(e.x,e.y); pop('+'+pts,e.x,e.y-10,'#e5384e'); if(combo>=2) pop('x'+Math.min(combo,5),dcx,dcy-72,'#ffb300'); sfxBerry(Math.min(combo,6)); } } }
    else if(e.k==='bat'){ if(invuln<=0 && Math.abs(e.x-dinoX)<32 && (groundY+dy-118)<(e.y+11) && (e.y-11)<(groundY+dy-8)){
      if(shield){ shield=false; invuln=30; e.dead=true; shieldPop(dcx,dcy-64); shake=8; combo=0; sfxShield(); } else over(); } }
  }
  ents=ents.filter(e=> e.x>-60 && !e.dead && !((e.k==='berry'||e.k==='gold'||e.k==='mag')&&e.got));
}

// ---- particles + score popups (juice) ----
function updateParticles(){
  for(const p of parts){ if(p.ring){ p.r+=p.vr; p.vr*=0.9; p.life--; } else { p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=0.99; p.life--; if(p.spin!=null) p.rot+=p.spin; } }
  parts=parts.filter(p=>p.life>0 && (p.ring||p.y<H+40));
  for(const q of pops){ q.y+=q.vy; q.vy*=0.9; q.life--; }
  pops=pops.filter(q=>q.life>0);
}
function sparkle(x,y){ for(let i=0;i<9;i++){ const a=Math.random()*TAU, s=1.5+Math.random()*2.5;
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,g:0.12,life:22+Math.random()*10,r:2+Math.random()*2,c:Math.random()<0.5?'#ffd54a':'#e5384e'}); } }
function dust(x){ for(let i=0;i<7;i++){ const s=1+Math.random()*2;
  parts.push({x:x+(Math.random()*24-12),y:groundY+2,vx:(Math.random()*2-1)*s,vy:-Math.random()*1.5,g:0.14,life:16+Math.random()*8,r:2+Math.random()*2.5,c:'#d8bd7c'}); } }
function hitBurst(x,y){ for(let i=0;i<14;i++){ const a=Math.random()*TAU, s=2+Math.random()*3.5;
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,g:0.16,life:24+Math.random()*12,r:2+Math.random()*2.5,c:Math.random()<0.5?'#6a5a8f':'#e5384e'}); } }
function confetti(){ const cols=['#e5384e','#ffd54a','#4bae5a','#2b6cff','#ff8fb0','#9ad1bd'];
  for(let i=0;i<70;i++){ parts.push({x:Math.random()*W,y:-Math.random()*80,vx:(Math.random()*2-1)*1.5,vy:2+Math.random()*2.5,g:0.05,life:90+Math.random()*50,r:3+Math.random()*3,c:cols[i%cols.length],rect:1,rot:Math.random()*TAU,spin:(Math.random()*2-1)*0.3}); } }
function pop(text,x,y,c){ pops.push({text,x,y,vy:-1.4,life:40,c}); }
function goldSparkle(x,y){ for(let i=0;i<14;i++){ const a=Math.random()*TAU,s=1.5+Math.random()*3;
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,g:0.1,life:26+Math.random()*12,r:2+Math.random()*2.5,c:Math.random()<0.5?'#ffe14a':'#fff'}); } }
function shieldPop(x,y){ for(let i=0;i<18;i++){ const a=Math.random()*TAU,s=2+Math.random()*3.5;
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,g:0.08,life:24+Math.random()*12,r:2+Math.random()*2.5,c:Math.random()<0.5?'#39d0ff':'#fff'}); } }
function diveSlam(x){ for(let i=0;i<10;i++){ const s=1.5+Math.random()*3; parts.push({x:x+(Math.random()*30-15),y:groundY+2,vx:(Math.random()*2-1)*s*1.4,vy:-Math.random()*2,g:0.16,life:18+Math.random()*8,r:2+Math.random()*3,c:'#e7d3a0'}); }
  parts.push({ring:1,x,y:groundY+2,r:8,vr:6,life:16,c:'rgba(255,255,255,.7)'}); }
function drawParticles(){
  for(const p of parts){ ctx.globalAlpha=Math.max(0,Math.min(1,p.life/18));
    if(p.ring){ ctx.strokeStyle=p.c; ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(p.x,p.y,p.r,p.r*0.4,0,0,TAU); ctx.stroke(); continue; }
    ctx.fillStyle=p.c;
    if(p.rect){ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot||0); ctx.fillRect(-p.r,-p.r*0.6,p.r*2,p.r*1.2); ctx.restore(); }
    else { ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,TAU); ctx.fill(); } }
  ctx.globalAlpha=1; ctx.textAlign='center'; ctx.font='bold 20px system-ui,sans-serif'; ctx.lineWidth=3; ctx.strokeStyle='rgba(255,255,255,.75)';
  for(const q of pops){ ctx.globalAlpha=Math.max(0,q.life/40); ctx.fillStyle=q.c; ctx.strokeText(q.text,q.x,q.y); ctx.fillText(q.text,q.x,q.y); }
  ctx.globalAlpha=1;
}

// ---- background: day / dawn / dusk / night by the player's local clock ----
const PAL={
  day:  {a:'#bfe0f2',b:'#d7ecdf',c:'#c2d6cf', hill:'#a9d6ba', gr:'#e7d3a0', dash:'#d3b978', cloud:'rgba(255,255,255,.85)', orb:'#ffe27a', night:0, low:0},
  dawn: {a:'#ffcf9e',b:'#ffc2c2',c:'#e7d6c2', hill:'#c3cf9f', gr:'#e6cf9c', dash:'#cfb072', cloud:'rgba(255,224,224,.8)',  orb:'#ff9e5e', night:0, low:1},
  dusk: {a:'#f79a58',b:'#c07ba0',c:'#5f4f82', hill:'#7f8fa6', gr:'#caa878', dash:'#a98f5f', cloud:'rgba(255,205,190,.6)',  orb:'#ff7a48', night:0, low:1},
  night:{a:'#121a3e',b:'#1d2550',c:'#2a3352', hill:'#333f68', gr:'#4a4a60', dash:'#5b5b74', cloud:'rgba(205,210,235,.28)', orb:'#eef2ff', night:1, low:0}
};
function bg(){
  const hr=(new Date()).getHours(); const forced=P.get('bg');
  const ph = (PAL[forced]?forced : (hr<5?'night' : hr<8?'dawn' : hr<18?'day' : hr<21?'dusk' : 'night'));
  const C=PAL[ph];
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,C.a); g.addColorStop(.6,C.b); g.addColorStop(1,C.c);
  ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
  if(C.night){ ctx.fillStyle='#fff'; for(let i=0;i<40;i++){ const sx=(i*97+13)%W, sy=(i*53+7)%180;
    ctx.globalAlpha=0.3+0.6*(0.5+0.5*Math.sin(t*0.05+i)); ctx.fillRect(sx,sy,2,2); } ctx.globalAlpha=1; }
  const ox=W-80, oy=C.low?120:66;
  ctx.fillStyle=C.orb; ctx.beginPath(); ctx.arc(ox,oy,30,0,TAU); ctx.fill();
  if(C.night){ ctx.fillStyle=C.b; ctx.beginPath(); ctx.arc(ox+11,oy-8,26,0,TAU); ctx.fill(); }
  const drift=(state==='play'?t*speed:t)*0.15;
  ctx.fillStyle=C.hill; ctx.beginPath(); ctx.moveTo(-20,H);
  for(let x=-20;x<=W+20;x+=10) ctx.lineTo(x, 210+Math.sin((x+drift)*0.012)*20); ctx.lineTo(W+20,H); ctx.fill();
  ctx.fillStyle=C.cloud;
  for(let i=0;i<3;i++){ let cx2=((i*300 - (state==='play'?t*speed*0.3:t*0.4))%960+960)%960-80, cy=54+i*26;
    ctx.beginPath(); ctx.ellipse(cx2,cy,34,20,0,0,TAU); ctx.ellipse(cx2+28,cy+6,24,15,0,0,TAU); ctx.fill(); }
  ctx.fillStyle=C.gr; ctx.fillRect(-20,groundY+18,W+40,H-groundY);
  ctx.strokeStyle=shade(C.gr,0.85); ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(-20,groundY+18); ctx.lineTo(W+20,groundY+18); ctx.stroke();
  ctx.fillStyle=C.dash; const gd=(state==='play'?t*speed:t*1.4);
  for(let i=0;i<26;i++){ let x=((i*52 - gd)%1400+1400)%1400-40; ctx.fillRect(x,groundY+30,24,4); }
}

function hud(){
  ctx.font='bold 20px system-ui,sans-serif'; ctx.lineWidth=3.5; ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.fillStyle='#243026';
  ctx.textAlign='left';  ctx.strokeText('🍓 '+Math.floor(score),16,30); ctx.fillText('🍓 '+Math.floor(score),16,30);
  ctx.textAlign='right'; ctx.strokeText('Best '+hi,W-16,30); ctx.fillText('Best '+hi,W-16,30);
  if(state==='play' && combo>=2){ ctx.textAlign='left'; ctx.font='bold 18px system-ui,sans-serif'; ctx.fillStyle='#d8442f';
    ctx.strokeText('🔥 x'+Math.min(combo,5),16,54); ctx.fillText('🔥 x'+Math.min(combo,5),16,54); }
  const ic=[]; if(shield) ic.push('🛡'); if(magnet>0) ic.push('🧲');
  if(ic.length){ ctx.textAlign='center'; ctx.font='22px system-ui,sans-serif'; ctx.fillStyle='#fff';
    ic.forEach((s,i)=>{ ctx.fillText(s, W/2+(i-(ic.length-1)/2)*30, 32); }); }
}
function panel(lines){
  ctx.fillStyle='rgba(18,28,26,.55)'; const w=460,h=132,x=(W-w)/2,y=(H-h)/2-6;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,16); ctx.fill();
  ctx.textAlign='center';
  lines.forEach((L,i)=>{ ctx.fillStyle=L[2]||'#fff'; ctx.font=(L[1]||'bold 20px')+' system-ui,sans-serif';
    ctx.fillText(L[0], W/2, y+40+i*30); });
}
function getBoard(){ try{ return JSON.parse(localStorage.getItem('dinoBoard')||'[]'); }catch(e){ return []; } }
function recordScore(sc){ const list=getBoard(); const entry={name:(pName||'you').slice(0,10), score:sc};
  list.push(entry); list.sort((a,b)=>b.score-a.score); const top=list.slice(0,5);
  justPlacedIdx=top.indexOf(entry); localStorage.setItem('dinoBoard', JSON.stringify(top)); }
function bigPanel(topLines, foot){
  const list=getBoard(), rows=list.length;
  const w=344, headH=topLines.length*27+12, boardH=22+Math.max(rows,1)*19+4, footH=30, h=headH+boardH+footH;
  const x=(W-w)/2, y=(H-h)/2-2;
  ctx.fillStyle='rgba(18,28,26,.66)'; ctx.beginPath(); ctx.roundRect(x,y,w,h,16); ctx.fill();
  ctx.textAlign='center'; let cy=y+28;
  topLines.forEach(L=>{ ctx.fillStyle=L[2]||'#fff'; ctx.font=(L[1]||'bold 22px')+' system-ui,sans-serif'; ctx.fillText(L[0],W/2,cy); cy+=27; });
  cy+=2; ctx.fillStyle='#ffd27a'; ctx.font='bold 14px system-ui,sans-serif'; ctx.fillText('🏆 Top runs',W/2,cy); cy+=19;
  ctx.font='600 14px system-ui,sans-serif';
  if(!rows){ ctx.fillStyle='#aab8c6'; ctx.fillText('play to set a score!',W/2,cy); cy+=19; }
  list.forEach((e,i)=>{ ctx.fillStyle=(i===justPlacedIdx)?'#ffe08a':'#e8eef5';
    ctx.textAlign='left'; ctx.fillText((i+1)+'.  '+(e.name||'you'), x+42, cy);
    ctx.textAlign='right'; ctx.fillText(''+e.score, x+w-42, cy); cy+=19; });
  cy+=8; ctx.textAlign='center'; ctx.fillStyle='#bfe3ff'; ctx.font='bold 15px system-ui,sans-serif'; ctx.fillText(foot,W/2,cy);
}

function frame(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(cardMode){ ctx.fillStyle='#0e1524'; ctx.fillRect(0,0,W,H); ctx.drawImage(buildCard(),(W-640)/2,0); requestAnimationFrame(frame); return; }
  update();
  if(shake>0.4) ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
  bg();
  for(const e of ents){ if(e.k==='bat') drawBat(ctx,e.x,e.y, t*0.3+e.f); else drawBerry(ctx,e.x,e.y, e.k); }
  const blink=(t%240)<8?0:1;
  const flashing = invuln>0 && Math.floor(t/3)%2===0;
  if(flashing) ctx.globalAlpha=0.4;
  drawDino(ctx, dinoX, groundY+dy, SC, {t, flip:true, walk:(state==='play'&&!air), jump:air, shades:shadesOn, hat:hatOn, open:(state==='over'?0:blink), sx:1+sq*0.6, sy:1-sq});
  ctx.globalAlpha=1;
  if(shield){ const pu=1+Math.sin(t*0.18)*0.03;
    ctx.save(); ctx.translate(dinoX-4, groundY+dy-92); ctx.scale(pu,pu);
    ctx.fillStyle='rgba(120,225,255,.13)'; ctx.beginPath(); ctx.ellipse(0,0,78,116,0,0,TAU); ctx.fill();
    ctx.strokeStyle='rgba(60,205,255,.85)'; ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(0,0,78,116,0,0,TAU); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.6; ctx.beginPath(); ctx.ellipse(-22,-34,18,28,0,Math.PI*1.05,Math.PI*1.65); ctx.stroke();
    ctx.restore(); }
  if(magnet>0){ ctx.save(); ctx.translate(dinoX-4, groundY+dy-92); ctx.strokeStyle='rgba(74,163,255,.6)'; ctx.lineWidth=2.5;
    for(let k=0;k<2;k++){ const rr=34+k*26+((t*2)%26); ctx.globalAlpha=0.55*(1-((rr-34)/60)); ctx.beginPath(); ctx.arc(0,0,rr,0,TAU); ctx.stroke(); }
    ctx.globalAlpha=1; ctx.restore(); }
  drawParticles();
  if(hitFlash>0){ ctx.fillStyle='rgba(229,56,78,'+(hitFlash/40)+')'; ctx.fillRect(-20,-20,W+40,H+40); hitFlash--; }
  hud();
  if(state==='menu'){ const L=[['🍓 Strawberry Dash','bold 24px']];
    L.push(challenge>0?['🔥 Beat '+challenge+'!','bold 17px','#ffd27a']:['🍓 eat · 🦇 dodge · 🌟 gold=shield · 🔵 blue=magnet','500 12px','#cde']);
    bigPanel(L,'Tap / click / Space to play'); }
  if(state==='over'){ const beat=challenge>0 && lastScore>challenge;
    bigPanel([[newBest?'🎉 NEW BEST! 🎉':(beat?'🎉 You beat '+challenge+'!':'Game Over'),'bold 24px',(newBest||beat)?'#ffe08a':'#fff'],
      ['Score '+lastScore+' · Best '+hi,'500 16px','#dfe']], 'Tap to retry · 📤 Share below'); }
  requestAnimationFrame(frame);
}

// ------------------------------------------------ share --
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200); }

function buildCard(){
  const c=document.createElement('canvas'); c.width=640; c.height=360; const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,360); g.addColorStop(0,'#bfe0f2'); g.addColorStop(.6,'#d7ecdf'); g.addColorStop(1,'#c2d6cf');
  x.fillStyle=g; x.fillRect(0,0,640,360);
  x.fillStyle='#ffe27a'; x.beginPath(); x.arc(566,60,28,0,TAU); x.fill();
  x.fillStyle='rgba(255,255,255,.85)'; [[120,66],[430,48]].forEach(([cx,cy])=>{ x.beginPath(); x.ellipse(cx,cy,32,19,0,0,TAU); x.ellipse(cx+24,cy+6,21,13,0,0,TAU); x.fill(); });
  x.fillStyle='#a9d6ba'; x.beginPath(); x.moveTo(0,360); for(let i=0;i<=640;i+=10) x.lineTo(i,252+Math.sin(i*0.02)*15); x.lineTo(640,360); x.fill();
  x.fillStyle='#e7d3a0'; x.fillRect(0,302,640,58); x.strokeStyle='#c9ad6a'; x.lineWidth=4; x.beginPath(); x.moveTo(0,302); x.lineTo(640,302); x.stroke();
  drawBerry(x,258,132); drawBerry(x,224,176); drawBat(x,470,116,1.2);
  drawDino(x,150,300,1.18,{t:12, flip:true, walk:false, shades:shadesOn, hat:hatOn, open:1});
  x.textAlign='left';
  x.fillStyle='#26383f'; x.font='bold 22px system-ui,sans-serif'; x.fillText('🍓 Strawberry Dash', 316, 58);
  x.fillStyle='#1f6d4f'; x.font='bold 20px system-ui,sans-serif'; x.fillText(pName? pName.toUpperCase() : 'MY SCORE', 318, 116);
  x.fillStyle='#e5384e'; x.font='bold 82px system-ui,sans-serif'; x.fillText(String(lastScore||hi), 316, 198);
  x.fillStyle='#26383f'; x.font='bold 22px system-ui,sans-serif'; x.fillText('Best '+hi, 318, 234);
  x.fillStyle='#3a4a50'; x.font='600 17px system-ui,sans-serif'; x.fillText('Can you beat me? 👉', 318, 272);
  x.fillStyle='#2b6cff'; x.font='bold 16px system-ui,sans-serif'; x.fillText('velesnitski.github.io/dino', 318, 320);
  return c;
}

async function shareResult(){ initAudio();
  const sc=lastScore||hi;
  const url=GAME_URL+'#c='+(hi||sc);
  const who=pName?pName+' ':'I ';
  const text=who+'scored '+(lastScore||hi)+' in Strawberry Dash 🦕🍓 (best '+hi+')! Can you beat me? Play: '+GAME_URL;
  buildCard().toBlob(async(blob)=>{
    const file=blob? new File([blob],'strawberry-dash.png',{type:'image/png'}):null;
    try{
      if(file && navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file],text,title:'Strawberry Dash',url}); return; }
      if(navigator.share){ await navigator.share({text,title:'Strawberry Dash',url}); return; }
    }catch(e){ if(e && e.name==='AbortError') return; }
    try{ await navigator.clipboard.writeText(text+' '+url); toast('Result + link copied! 📋'); }
    catch(e){ toast('Copy: '+url); }
    if(blob){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='strawberry-dash.png'; a.click(); }
  },'image/png');
}

async function shareLink(){ initAudio();
  const text='Play Strawberry Dash 🦕🍓';
  try{ if(navigator.share){ await navigator.share({title:'Strawberry Dash',text,url:GAME_URL}); return; } }
  catch(e){ if(e && e.name==='AbortError') return; }
  try{ await navigator.clipboard.writeText(GAME_URL); toast('Game link copied! 🔗'); }
  catch(e){ toast(GAME_URL); }
}

// input
const stage=document.getElementById('stage');
stage.addEventListener('click', action);
stage.addEventListener('touchstart', e=>{ e.preventDefault(); action(); }, {passive:false});
addEventListener('keydown', e=>{ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); action(); } });

const mBtn=document.getElementById('mute'), sBtn=document.getElementById('shades'), hBtn=document.getElementById('hat');
function paintMute(){ mBtn.textContent=muted?'🔇 Muted':'🔊 Sound'; mBtn.classList.toggle('on',!muted); }
mBtn.onclick=()=>{ muted=!muted; localStorage.setItem('dinoMute',muted?'1':'0'); paintMute(); initAudio(); };
sBtn.onclick=()=>{ shadesOn=!shadesOn; sBtn.classList.toggle('on',shadesOn); };
hBtn.onclick=()=>{ hatOn=!hatOn; hBtn.classList.toggle('on',hatOn); };
document.getElementById('cBody').oninput =e=>bodyHex=e.target.value;
document.getElementById('cPlate').oninput=e=>plateHex=e.target.value;
document.getElementById('cBelly').oninput=e=>bellyHex=e.target.value;
document.getElementById('share').onclick=shareResult;
document.getElementById('link').onclick=shareLink;
const nameEl=document.getElementById('pname'); nameEl.value=pName;
nameEl.oninput=e=>{ pName=e.target.value.slice(0,12); localStorage.setItem('dinoName',pName); };
paintMute();
if(demo) state='play';
if(P.has('fx')){ confetti(); sparkle(320,180); pop('+25',320,168,'#e5384e'); pop('x5',258,120,'#ffb300'); }
if(P.has('seed')) localStorage.setItem('dinoBoard', JSON.stringify([{name:'MILA',score:412},{name:'LEO',score:388},{name:'you',score:240},{name:'MILA',score:150},{name:'LEO',score:96}]));
requestAnimationFrame(frame);
