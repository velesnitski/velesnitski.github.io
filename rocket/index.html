<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🚀</title>
<meta name="description" content="a little rocket. poke it.">
<meta name="theme-color" content="#0e1524">
<link rel="shortcut icon" type="image/x-icon" href="../favicons/favicon.ico">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0b1120;font-family:system-ui,-apple-system,sans-serif;color:#e8eef5}
  canvas#c{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:grab;touch-action:none}
  canvas#c.hold{cursor:grabbing}
  #more{position:fixed;right:18px;bottom:13px;z-index:6;color:#66788c;font-weight:800;font-size:15px;
        cursor:pointer;user-select:none;text-decoration:underline}
  #more:hover{color:#9fb4c9}
  #pop{position:fixed;right:16px;bottom:44px;z-index:6;background:rgba(14,22,36,.94);border:1px solid #24344a;
       border-radius:14px;padding:14px 18px;font-size:13px;line-height:1.9;display:none;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  #pop.show{display:block}
  #pop a{color:#8fc4ff}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="more">???</div>
  <div id="pop">
    a wobbly rocket · poke it, fling it, spin it<br>
    it delivers strawberries to <a href="../dino/">🍓 Strawberry Dash</a><br>
    the little planet is lit by real players<br>
    <span style="color:#5a6a7c">by velesnitski · three.js · rocket v9</span>
  </div>

<script src="three.min.js"></script>
<script>
addEventListener('error',e=>{ document.title='ERR: '+e.message; });        // headless smoke-test hook
const TELEMETRY_EP='https://script.google.com/macros/s/AKfycbyA-zpBfGubbXMPGJNe5_nRhcAWUt19uE_nln2oCbH4XGjnwkT6qjC1cNEWrlpQXnqf/exec';
const Q=new URLSearchParams(location.search);
const REDUCED=matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ── palette: Strawberry Dash's own colors ── */
const MINT='#7fd6b0', BERRY='#e5384e', CREAM='#f3e6c6', OUT='#26383f', SPACE_BLUE='#3d5bc0';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
renderer.setClearColor('#0b1120');
const scene=new THREE.Scene();
const CAMZ=40;
const cam=new THREE.PerspectiveCamera(45, innerWidth/innerHeight, .1, 2000);
cam.position.set(0,2.5,CAMZ);
scene.add(new THREE.HemisphereLight(0xffffff, 0x39465c, 1.05));
const sun=new THREE.DirectionalLight(0xfff2d0, 1.1); sun.position.set(60,80,50); scene.add(sun);
const rimL=new THREE.DirectionalLight('#6f8fff', .7); rimL.position.set(-50,20,-60); scene.add(rimL);   // cold space rim

/* ── tiny helpers ── */
const M=(geo,color,flat)=>new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color, flatShading:!!flat}));
const P=(geo,color,shin=60)=>new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color, shininess:shin, specular:'#4a5568'}));
const lathe=(pts,color,shin)=>P(new THREE.LatheGeometry(pts.map(p=>new THREE.Vector2(p[0],p[1])),48),color,shin);
function canvasTex(draw,w=128,h=128){ const c=document.createElement('canvas'); c.width=w; c.height=h;
  draw(c.getContext('2d'),w,h); return new THREE.CanvasTexture(c); }
function spriteText(text,size=42,color='#ffd27a'){ const pad=18;
  const c=document.createElement('canvas'); const x=c.getContext('2d');
  x.font=`800 ${size}px system-ui,sans-serif`; c.width=Math.ceil(x.measureText(text).width)+pad*2; c.height=size+pad*2;
  const x2=c.getContext('2d'); x2.font=`800 ${size}px system-ui,sans-serif`; x2.textBaseline='middle';
  x2.shadowColor='rgba(0,0,0,.55)'; x2.shadowBlur=10; x2.fillStyle=color; x2.fillText(text,pad,c.height/2);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c), transparent:true, depthWrite:false}));
  s.scale.set(c.width/22, c.height/22, 1); return s; }

/* ══ THE FACE — a live canvas in the porthole ══ */
const faceCv=document.createElement('canvas'); faceCv.width=faceCv.height=128;
const faceCx=faceCv.getContext('2d'), faceTex=new THREE.CanvasTexture(faceCv);
let faceState='', faceBlink=false;
function drawFace(state){
  const x=faceCx; x.setTransform(1,0,0,1,0,0);
  x.fillStyle='#0e1a2a'; x.fillRect(0,0,128,128);
  if(state==='dizzy'){ x.translate(64,64); x.rotate(.12); x.translate(-64,-64); }
  x.fillStyle=MINT; x.beginPath(); x.arc(64,74,50,0,7); x.fill();                       // head fills the window
  x.fillStyle='rgba(238,110,140,.6)'; x.beginPath(); x.ellipse(76,74,10,7,0,0,7); x.fill();  // blush
  x.strokeStyle=OUT; x.lineWidth=4; x.lineCap='round';
  if(state==='dizzy'){                                                                   // spiral eye + wavy maw
    for(let r=9;r>2;r-=3){ x.beginPath(); x.arc(48,56,r,r*.9,r*.9+4.6); x.stroke(); }
    x.beginPath(); x.moveTo(30,82); x.quadraticCurveTo(38,76,46,82); x.quadraticCurveTo(54,88,62,82); x.stroke();
  }else if(state==='wheee'){                                                             // ^ eye + open maw
    x.beginPath(); x.arc(48,58,9, Math.PI*1.12, Math.PI*1.88); x.stroke();
    x.fillStyle='#182226'; x.beginPath(); x.ellipse(44,80,11,12,0,0,7); x.fill();
    x.fillStyle='#ee6e8c'; x.beginPath(); x.ellipse(44,86,6,5,0,0,7); x.fill();
  }else{
    if(faceBlink){ x.beginPath(); x.moveTo(40,56); x.lineTo(56,58); x.stroke(); }
    else{ x.fillStyle='#182226'; x.beginPath(); x.ellipse(48,56,9,11,0,0,7); x.fill();
          x.fillStyle='#fff'; x.beginPath(); x.arc(44,51,4,0,7); x.fill(); }
    x.beginPath(); x.arc(40,78,12,.4,2.4); x.stroke();
  }
  faceTex.needsUpdate=true;
}
function setFace(s){ if(s!==faceState){ faceState=s; drawFace(s); } }

/* ══ THE ROCKET — physics root ▸ squash ▸ hull, with jiggle-boned nose & fins ══ */
const root=new THREE.Group(), squash=new THREE.Group();
root.add(squash); scene.add(root);
const noseGrp=new THREE.Group(); noseGrp.position.y=8;
const antGrp=new THREE.Group(); antGrp.position.y=4.3;      // antenna pivots at its base on the dome tip
const finGrps=[];
{
  // one continuous bullet profile — no seams, no facets, just emoji curves
  const body=lathe([[.01,-8.4],[1.9,-8.15],[2.7,-7.4],[3.3,-5.6],[3.62,-3],[3.7,-.2],
    [3.55,2.4],[3.15,4.6],[2.55,6.4],[1.85,7.7],[1.3,8.6],[.01,9.3]],'#f2f6fa',80);
  squash.add(body);
  // rounded dome cap, overlapping the body so the color seam is clean
  noseGrp.add(lathe([[.01,-1.6],[2.62,-1.55],[2.5,-.6],[2.25,.5],[1.9,1.6],
    [1.45,2.7],[.95,3.6],[.5,4.2],[.01,4.5]],SPACE_BLUE,55));
  squash.add(noseGrp);
  // bobble antenna — nested in the nose so its wobble compounds with the nose's
  const stem=P(new THREE.CylinderGeometry(.15,.22,2.2,10),'#c9d2df',60); stem.position.y=1.1; antGrp.add(stem);
  const bob=P(new THREE.SphereGeometry(.6,16,16),'#ffd54a',90); bob.position.y=2.4; antGrp.add(bob);
  noseGrp.add(antGrp);
  // tail-mounted fins — rooted low where the hull tapers, so the leading edge exits the
  // surface at a steep angle (a clean intersection line, not a tangent graze up the belly)
  const finShape=new THREE.Shape();
  finShape.moveTo(-.45,1.6);                               // root top, just inside the hull
  finShape.quadraticCurveTo(1.7,-.4, 3.7,-4.4);            // ONE continuous swept leading edge — triangular sail
  finShape.quadraticCurveTo(4.05,-5.0, 3.55,-5.45);        // rounded foot tip (boot mounts here)
  finShape.quadraticCurveTo(1.5,-5.0, -.45,-4.5);          // bottom edge climbing gently back to the root
  finShape.lineTo(-.45,1.6);
  const finGeo=new THREE.ExtrudeGeometry(finShape,{depth:.8,bevelEnabled:true,
    bevelThickness:.24,bevelSize:.24,bevelSegments:3,curveSegments:14});
  finGeo.translate(0,0,-.4);
  { // airfoil taper — thin toward the tip; the plate stays a true radial plane,
    // perpendicular to the fuselage like the emoji's fins (no camber, no lean)
    const pa=finGeo.attributes.position;
    for(let i=0;i<pa.count;i++){ const d=Math.min(1,Math.max(0,pa.getX(i)/3.9));
      pa.setZ(i, pa.getZ(i)*(1-.72*d)); }
    finGeo.computeVertexNormals(); }
  // 4 fins at 90°, offset 45° from the camera — always two clean symmetric profiles, none flat-on
  for(let i=0;i<4;i++){ const a=Math.PI/4+i*Math.PI/2, g=new THREE.Group();
    g.position.set(Math.cos(a)*3.0,-4.6,Math.sin(a)*3.0); g.rotation.y=-a; g.userData.a=a;
    const fin=P(finGeo,SPACE_BLUE,45); fin.rotation.y=-Math.PI/2; g.add(fin);
    // landing booties — gold pads on the fin tips (it lands on its feet, like any good toy)
    const boot=P(new THREE.SphereGeometry(.75,14,12),'#ffd54a',70);
    boot.scale.y=.62; boot.position.set(0,-5.35,3.4); g.add(boot);
    finGrps.push(g); squash.add(g); }
  // flared engine bell, gunmetal, double-sided so the inside reads as metal, with a dark throat
  const nozzle=lathe([[.9,0],[1.75,-.2],[2.05,-.95],[2.5,-1.9],[2.8,-2.55],[2.55,-2.75]],'#3f4756',40);
  nozzle.material.side=THREE.DoubleSide; nozzle.position.y=-8.2; squash.add(nozzle);
  const throat=new THREE.Mesh(new THREE.CircleGeometry(2.2,24),
    new THREE.MeshBasicMaterial({color:'#10151f'}));
  throat.rotation.x=Math.PI/2; throat.position.y=-10.1; squash.add(throat);
  const engLight=new THREE.PointLight('#ffb066', 0, 30); engLight.position.y=-12; squash.add(engLight);
  window.engLight=engLight;
  // recessed porthole: dark sleeve into the hull, face set back inside, rim flush with bolts
  const sleeve=P(new THREE.CylinderGeometry(1.8,1.8,1.2,28,1,true),'#141d2c',15);
  sleeve.material.side=THREE.DoubleSide;
  sleeve.rotation.x=Math.PI/2; sleeve.position.set(0,2.6,2.9); squash.add(sleeve);
  const port=new THREE.Mesh(new THREE.CircleGeometry(1.78,32), new THREE.MeshBasicMaterial({map:faceTex}));
  port.position.set(0,2.6,3.54); port.rotation.x=-.09; squash.add(port);
  const rim=P(new THREE.TorusGeometry(1.95,.26,12,36),'#ffd54a',80);
  rim.position.set(0,2.6,3.62); rim.rotation.x=-.09; squash.add(rim);   // tilted to the hull's slope
  for(let i=0;i<4;i++){ const b=P(new THREE.SphereGeometry(.15,10,10),'#ffd54a',90);
    const a=Math.PI/4+i*Math.PI/2;
    b.position.set(Math.cos(a)*2.28, 2.6+Math.sin(a)*2.28, 3.58); squash.add(b); }
  const berryTex=canvasTex(x=>{ x.clearRect(0,0,128,128); x.font='90px system-ui'; x.textAlign='center'; x.fillText('🍓',64,96); });
  const decal=new THREE.Mesh(new THREE.PlaneGeometry(3.4,3.4), new THREE.MeshBasicMaterial({map:berryTex,transparent:true}));
  decal.position.set(0,-2.8,3.78); squash.add(decal);
  // collar band over the nose joint — the seam becomes an intentional staging line
  const collar=P(new THREE.TorusGeometry(2.6,.2,12,40),'#ffd54a',85);
  collar.rotation.x=Math.PI/2; collar.position.y=6.42; squash.add(collar);
  // a band-aid: this rocket gets flung into walls for a living
  const bandTex=canvasTex(x=>{ x.clearRect(0,0,128,128); x.translate(64,64); x.rotate(.55);
    const rr=(a,b,w,h,r)=>{ x.beginPath(); x.moveTo(a+r,b); x.arcTo(a+w,b,a+w,b+h,r);
      x.arcTo(a+w,b+h,a,b+h,r); x.arcTo(a,b+h,a,b,r); x.arcTo(a,b,a+w,b,r); x.fill(); };
    x.fillStyle='#e8c9a0'; rr(-46,-15,92,30,13);
    x.fillStyle='#d9b489'; rr(-15,-11,30,22,7);
    x.fillStyle='rgba(120,90,55,.5)';
    for(let i=0;i<6;i++){ x.beginPath(); x.arc(-8+(i%3)*8,-4+((i/3)|0)*8,1.3,0,7); x.fill(); } });
  // band-aid on the nose — a scraped nose, clearly readable from the front
  const band=new THREE.Mesh(new THREE.PlaneGeometry(2.2,2.2),
    new THREE.MeshBasicMaterial({map:bandTex,transparent:true}));
  band.position.set(Math.sin(.4)*2.32, .5, Math.cos(.4)*2.32);
  band.rotation.y=.4; band.rotateX(-.18); noseGrp.add(band);
}
setFace('normal');
// fat invisible hit capsule — generous target for little fingers
const hit=new THREE.Mesh(new THREE.CylinderGeometry(6.5,6.5,30,10),
  new THREE.MeshBasicMaterial({visible:false}));
root.add(hit);
// engine flame (shows when moving fast)
const flame=M(new THREE.ConeGeometry(1.9,7,12),'#ffb066');
flame.material=new THREE.MeshBasicMaterial({color:'#ffb066',transparent:true,opacity:.85,
  blending:THREE.AdditiveBlending,depthWrite:false});
flame.rotation.x=Math.PI; flame.position.y=-13.5; flame.visible=false; squash.add(flame);

/* ── exhaust puffs (world space) ── */
const EXN=400, exG=new THREE.BufferGeometry();
const exPos=new Float32Array(EXN*3), exVel=new Float32Array(EXN*3), exLife=new Float32Array(EXN);
exPos.fill(9999);
exG.setAttribute('position', new THREE.BufferAttribute(exPos,3));
const exhaust=new THREE.Points(exG, new THREE.PointsMaterial({color:'#ffb066', size:1.5, transparent:true, opacity:.85,
  blending:THREE.AdditiveBlending, depthWrite:false}));
scene.add(exhaust); let exI=0;
function puff(px,py,pz,vx,vy,vz){ const i=exI++%EXN;
  exPos[i*3]=px; exPos[i*3+1]=py; exPos[i*3+2]=pz;
  exVel[i*3]=vx+(Math.random()-.5)*6; exVel[i*3+1]=vy+(Math.random()-.5)*6; exVel[i*3+2]=vz+(Math.random()-.5)*6;
  exLife[i]=.5+Math.random()*.4; }

/* ── stars, twinkling in two phases ── */
function starCloud(n,size,color){ const pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){ const v=new THREE.Vector3().randomDirection().multiplyScalar(300+Math.random()*900);
    pos.set([v.x,v.y,v.z-200],i*3); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const p=new THREE.Points(g,new THREE.PointsMaterial({color,size,transparent:true,opacity:.8,depthWrite:false}));
  scene.add(p); return p; }
const stars1=starCloud(500,2.2,'#cfe2ff'), stars2=starCloud(400,1.4,'#ffe3b8');   // cool + warm layers
// a shooting star now and then
const shoot=new THREE.Mesh(new THREE.PlaneGeometry(9,.14),
  new THREE.MeshBasicMaterial({color:'#eaf2ff',transparent:true,opacity:0,
    blending:THREE.AdditiveBlending,depthWrite:false}));
shoot.rotation.z=-.5; shoot.visible=false; scene.add(shoot);
let shootT=9, shootNext=6;

/* ══ the little strawberry planet, far away, lit by real players ══ */
const planet=new THREE.Group(); planet.position.set(-42,22,-170); planet.scale.setScalar(.34); scene.add(planet);
{
  const skin=canvasTex((x,w,h)=>{ x.fillStyle=BERRY; x.fillRect(0,0,w,h);
    for(let i=0;i<180;i++){ x.fillStyle=Math.random()<.85?'#ffe08a':'#ffd1dc'; x.save();
      x.translate(Math.random()*w,Math.random()*h); x.rotate(Math.random()); x.beginPath();
      x.ellipse(0,0,2.2,3.6,0,0,7); x.fill(); x.restore(); } },512,256);
  planet.add(new THREE.Mesh(new THREE.SphereGeometry(78,48,32), new THREE.MeshLambertMaterial({map:skin})));
  planet.add(M(new THREE.SphereGeometry(79,32,14,0,Math.PI*2,0,.62),'#4bae5a',true));   // leafy pole
  planet.add(new THREE.Mesh(new THREE.SphereGeometry(86,32,24),
    new THREE.MeshBasicMaterial({color:'#ff8fa8', transparent:true, opacity:.14, side:THREE.BackSide, depthWrite:false})));
}
const TZ_LL={ 'Europe/Minsk':[53,27],'Europe/Warsaw':[52,21],'Europe/London':[51,0],'Europe/Berlin':[52,13],
  'Europe/Paris':[48,2],'Europe/Madrid':[40,-3],'Europe/Kyiv':[50,30],'Europe/Moscow':[55,37],'Europe/Istanbul':[41,29],
  'Asia/Dubai':[25,55],'Asia/Tbilisi':[41,44],'Asia/Yerevan':[40,44],'Asia/Almaty':[43,76],'Asia/Tashkent':[41,69],
  'Asia/Bangkok':[13,100],'Asia/Tokyo':[35,139],'Asia/Shanghai':[31,121],'Asia/Kolkata':[22,78],'Asia/Singapore':[1,103],
  'America/New_York':[40,-74],'America/Chicago':[41,-87],'America/Denver':[39,-105],'America/Los_Angeles':[34,-118],
  'America/Sao_Paulo':[-23,-46],'America/Mexico_City':[19,-99],'America/Toronto':[43,-79],
  'Australia/Sydney':[-33,151],'Africa/Cairo':[30,31],'Africa/Lagos':[6,3],'Pacific/Auckland':[-36,174] };
function llToV(lat,lon,r){ const ph=(90-lat)*Math.PI/180, th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph), r*Math.sin(ph)*Math.sin(th)); }
const beacons=[];
function addBeacon(lat,lon,n){ const g=new THREE.Group(); g.position.copy(llToV(lat,lon,78));
  g.lookAt(new THREE.Vector3(0,0,0)); g.rotateX(-Math.PI/2);
  const cone=M(new THREE.ConeGeometry(2.2,7,8),'#ffd54a'); cone.position.y=4; g.add(cone);
  const halo=new THREE.Mesh(new THREE.SphereGeometry(3+Math.min(4,n),10,10),
    new THREE.MeshBasicMaterial({color:'#ffe08a', transparent:true, opacity:.45, depthWrite:false}));
  halo.position.y=6; g.add(halo); beacons.push(halo); planet.add(g); }
let satellite=null;
const fallbackBeacons=()=>[['Europe/Minsk',3],['Asia/Dubai',1],['Europe/Warsaw',1]]
  .forEach(([z,n])=>{ const ll=TZ_LL[z]; addBeacon(ll[0],ll[1],n); });
fetch(TELEMETRY_EP).then(r=>r.json()).then(j=>{
  if(j.wbest && j.wbest.sc){ satellite=new THREE.Group();
    const crown=spriteText('👑 '+String(j.wbest.n).replace(/[^\w \-\.]/g,'')+' · '+j.wbest.sc, 40);
    crown.position.y=8; satellite.add(crown);
    satellite.add(M(new THREE.SphereGeometry(3.4,12,12),CREAM)); planet.add(satellite); }
  (j.tzs||[]).forEach(t=>{ const ll=TZ_LL[t.tz]; if(ll) addBeacon(ll[0],ll[1],t.n|0); });
  if(!(j.tzs||[]).length) fallbackBeacons();
}).catch(fallbackBeacons);

/* ══ SOUND — tiny synth squeaks (unlocked on first touch, iOS-safe) ══ */
let AC=null;
function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)();
  const b=AC.createBufferSource(); b.buffer=AC.createBuffer(1,1,22050); b.connect(AC.destination); b.start(0); }catch(e){} }
  if(AC && AC.state==='suspended') AC.resume(); return AC; }
function tone(type,f0,f1,dur,vol){ const a=AC; if(!a) return;
  const o=a.createOscillator(), g=a.createGain(), t=a.currentTime;
  o.type=type; o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur+.02); }
const squeak=()=>tone('sine',520,940,.09,.10);
const boing =v=>tone('triangle',300,130,.20,Math.min(.14,.03+v*.004));
const whoosh=v=>tone('sawtooth',90,40,.25,Math.min(.08,.02+v*.002));
const wheee =()=>tone('sine',480,1250,.5,.06);

/* ══ PHYSICS — a bouncy rigid body on springs ══ */
const pos=new THREE.Vector3(), vel=new THREE.Vector3(), prevVel=new THREE.Vector3();
const quat=new THREE.Quaternion(), angVel=new THREE.Vector3();
const I_ROT=60;                                       // moment of inertia (long light thing)
let sq=0, sqVel=0;                                    // squash scalar spring
let wallX=20, wallTop=12, wallBot=12;                 // set in resize() from the frustum
let grabbed=false, grabLocal=new THREE.Vector3(), dragPlane=new THREE.Plane(),
    dragTarget=new THREE.Vector3(), samples=[], downAt=0, downPos=new THREE.Vector3();
let pokes=0, lastTouch=-9, dizzy=0, dizzyUntil=0, simT=0;
const jig=[{g:noseGrp,k:.12},{g:antGrp,k:.5}];        // nose + extra-floppy antenna…
finGrps.forEach(g=>jig.push({g,k:.2}));               // …+3 fins
jig.forEach(j=>{ j.rx=j.rz=j.vx=j.vz=0; });
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2(), tmpV=new THREE.Vector3(), tmpV2=new THREE.Vector3();

function kickJiggle(s){ jig.forEach(j=>{ j.vx+=(Math.random()-.5)*s; j.vz+=(Math.random()-.5)*s; }); }
// smoke rings — the bell puffs a wobbly donut on a hard bounce
const rings=[]; let ringI=0;
for(let i=0;i<4;i++){ const m=new THREE.Mesh(new THREE.TorusGeometry(1,.32,10,24),
  new THREE.MeshBasicMaterial({color:'#cfd8e6',transparent:true,opacity:0,depthWrite:false}));
  m.visible=false; scene.add(m); rings.push({m,t:9}); }
function smokeRing(){ const R=rings[ringI++%4]; R.t=0; R.m.visible=true;
  R.m.position.copy(root.localToWorld(new THREE.Vector3(0,-11.5,0)));
  R.m.quaternion.copy(quat); R.m.rotateX(Math.PI/2); }
function bounce(axis,v){ boing(Math.abs(v)); sqVel+=Math.min(3,Math.abs(v)*.12); kickJiggle(Math.abs(v)*.5);
  if(Math.abs(v)>14) smokeRing();
  angVel.z+=(axis==='x'? -Math.sign(v)*Math.abs(vel.y):Math.sign(vel.x))*.03; }

function step(dt){
  simT+=dt;
  const idleBobY=REDUCED?0:Math.sin(simT*1.3)*.8;

  if(grabbed){
    // spring toward the pointer, applied AT the grab point → natural torque (grab the nose, it swings)
    const gw=root.localToWorld(tmpV.copy(grabLocal));
    const r=tmpV2.copy(gw).sub(pos);
    const pv=r.clone().cross(angVel).negate().add(vel);          // velocity of the grab point
    const F=dragTarget.clone().sub(gw).multiplyScalar(90).sub(pv.multiplyScalar(14));
    if(F.length()>260) F.setLength(260);
    vel.addScaledVector(F,dt);
    angVel.addScaledVector(r.clone().cross(F), dt/I_ROT*9);
  }else{
    // lazy spring home (underdamped = bouncy return) + gentle idle bob
    vel.x+=(-pos.x*6 - vel.x*1.4)*dt;
    vel.y+=((idleBobY-pos.y)*6 - vel.y*1.4)*dt;
    vel.z+=(-pos.z*8 - vel.z*2.2)*dt;
  }
  // upright spring (axis-angle back to identity), always on but soft while held
  let q=quat.clone(); if(q.w<0){ q.set(-q.x,-q.y,-q.z,-q.w); }
  const ang=2*Math.acos(Math.min(1,q.w)), s=Math.sqrt(Math.max(1e-9,1-q.w*q.w));
  if(ang>1e-3){ tmpV.set(q.x/s,q.y/s,q.z/s);
    angVel.addScaledVector(tmpV, -ang*(grabbed?2.2:7)*dt); }
  angVel.multiplyScalar(Math.max(0,1-(grabbed?1.2:1.7)*dt));

  if(vel.length()>90) vel.setLength(90);
  if(angVel.length()>11) angVel.setLength(11);
  pos.addScaledVector(vel,dt);
  const w=angVel.length();
  if(w>1e-4){ const dq=new THREE.Quaternion().setFromAxisAngle(tmpV.copy(angVel).divideScalar(w), w*dt);
    quat.premultiply(dq).normalize(); }

  // soft walls — fling it, it boings around the screen
  if(pos.x> wallX  && vel.x>0){ pos.x= wallX;  vel.x*=-.62; bounce('x',vel.x); }
  if(pos.x<-wallX  && vel.x<0){ pos.x=-wallX;  vel.x*=-.62; bounce('x',vel.x); }
  if(pos.y> wallTop&& vel.y>0){ pos.y= wallTop; vel.y*=-.62; bounce('y',vel.y); }
  if(pos.y<-wallBot&& vel.y<0){ pos.y=-wallBot; vel.y*=-.62; bounce('y',vel.y); }
  pos.z=Math.max(-10,Math.min(10,pos.z));

  // squash & stretch spring
  sqVel+=(-160*sq-12*sqVel)*dt; sq=Math.max(-.28,Math.min(.42,sq+sqVel*dt));
  squash.scale.set(1-sq*.45, 1+sq, 1-sq*.45);

  // jiggle bones — driven by how hard the body is being shoved around
  const acc=tmpV.copy(vel).sub(prevVel).divideScalar(dt); prevVel.copy(vel);
  const la=acc.applyQuaternion(quat.clone().invert());
  jig.forEach(j=>{
    let ax=la.x, az=la.z;
    if(j.g.userData.a!==undefined){ const a=j.g.userData.a, c=Math.cos(a), sn=Math.sin(a);
      ax=c*la.x+sn*la.z; az=-sn*la.x+c*la.z; }
    j.vx+=(-140*j.rx-6*j.vx+az*j.k)*dt; j.vz+=(-140*j.rz-6*j.vz-ax*j.k)*dt;
    j.rx=Math.max(-.55,Math.min(.55,j.rx+j.vx*dt)); j.rz=Math.max(-.55,Math.min(.55,j.rz+j.vz*dt));
    j.g.rotation.x=j.rx; j.g.rotation.z=j.rz;
  });

  // face: spun hard → dizzy · moving fast → wheee · else blink now and then
  const spin=angVel.length(), speed=vel.length();
  dizzy=spin>5? dizzy+dt*spin : Math.max(0,dizzy-dt*4);
  if(dizzy>7) dizzyUntil=simT+2.6;
  if(FORCED_FACE) setFace(FORCED_FACE);
  else if(simT<dizzyUntil) setFace('dizzy');
  else if(speed>17) setFace('wheee');
  else setFace('normal');

  // engine: exhaust + flame while it's really moving
  flame.visible=speed>8;
  engLight.intensity=flame.visible? 1.8+Math.random()*1.2 : 0;
  if(flame.visible){ flame.scale.y=.7+Math.random()*.7;
    const noz=root.localToWorld(tmpV.copy(flame.position));
    puff(noz.x,noz.y,noz.z, -vel.x*.2, -vel.y*.2, -vel.z*.2); }
  for(let i=0;i<EXN;i++){ if(exLife[i]>0){ exLife[i]-=dt;
      exPos[i*3]+=exVel[i*3]*dt; exPos[i*3+1]+=exVel[i*3+1]*dt; exPos[i*3+2]+=exVel[i*3+2]*dt; }
    else exPos[i*3+1]=9999; }
  exG.attributes.position.needsUpdate=true;
  rings.forEach(R=>{ if(R.t<.9){ R.t+=dt; const s=1+R.t*6; R.m.scale.set(s,s,s);
      R.m.material.opacity=.5*Math.max(0,1-R.t/.9); R.m.position.y-=dt*3; }
    else R.m.visible=false; });

  // shooting star: streaks down-left across the far background every so often
  shootT+=dt;
  if(shootT>shootNext){ shootT=0; shootNext=11+Math.random()*14;
    shoot.position.set(20+Math.random()*60, 25+Math.random()*20, -140); shoot.visible=true; }
  if(shoot.visible){ shoot.position.x-=dt*90; shoot.position.y-=dt*46;
    shoot.material.opacity=Math.min(.9, shoot.material.opacity+dt*4);
    if(shoot.position.x<-70){ shoot.visible=false; shoot.material.opacity=0; } }

  // a shy little "hey, poke me" wiggle if ignored for a while
  if(!REDUCED && !grabbed && simT-lastTouch>13){ lastTouch=simT-13+5+Math.random()*6;
    kickJiggle(4); sqVel+=1.2; angVel.z+=.9; }
}

/* ══ POINTER — poke on touch, drag to fling ══ */
function pointerWorld(e,out){
  ndc.set(e.clientX/innerWidth*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(ndc,cam); return ray.ray.intersectPlane(dragPlane,out); }
canvas.addEventListener('pointerdown',e=>{
  audio(); lastTouch=simT;
  ndc.set(e.clientX/innerWidth*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(ndc,cam);
  const hitP=ray.intersectObject(hit,false)[0];
  if(!hitP) return;
  canvas.setPointerCapture(e.pointerId); canvas.classList.add('hold');
  // the poke lands NOW — instant feedback, then the grab begins
  const dir=tmpV.copy(pos).sub(hitP.point).normalize();
  vel.addScaledVector(dir,7); vel.y+=2;
  angVel.addScaledVector(tmpV2.copy(hitP.point).sub(pos).cross(dir), -0.18);
  sqVel+=1.6; kickJiggle(5); squeak(); pokes++;
  grabbed=true; grabLocal.copy(root.worldToLocal(hitP.point.clone()));
  dragPlane.setFromNormalAndCoplanarPoint(cam.getWorldDirection(new THREE.Vector3()).negate(), hitP.point);
  dragTarget.copy(hitP.point); downAt=performance.now(); downPos.copy(hitP.point);
  samples=[{p:hitP.point.clone(), t:downAt}];
});
canvas.addEventListener('pointermove',e=>{
  if(!grabbed) return;
  if(pointerWorld(e,dragTarget)){
    const now=performance.now(); samples.push({p:dragTarget.clone(), t:now});
    while(samples.length>2 && now-samples[0].t>110) samples.shift(); }
});
function release(){
  if(!grabbed) return; grabbed=false; canvas.classList.remove('hold');
  const now=performance.now(), a=samples[0], b=samples[samples.length-1];
  if(a && b && b.t-a.t>16){
    const fv=b.p.clone().sub(a.p).multiplyScalar(1000/(b.t-a.t));
    if(fv.length()>4){ if(fv.length()>80) fv.setLength(80);
      vel.copy(fv); whoosh(fv.length()); if(fv.length()>40) wheee(); } }
  lastTouch=simT;
}
canvas.addEventListener('pointerup',release);
canvas.addEventListener('pointercancel',release);

/* ??? */
const pop=document.getElementById('pop');
document.getElementById('more').addEventListener('click',()=>pop.classList.toggle('show'));

/* ── telemetry: one hello, one goodbye (with the poke count) ── */
let sid='rocket'; try{ sid=localStorage.getItem('dinoSid')||'rocket'; }catch(e){}
const base=()=>({v:56, sid, ua:navigator.userAgent.slice(0,180), lang:navigator.language||'',
  tz:(Intl.DateTimeFormat().resolvedOptions().timeZone||''), scr:screen.width+'x'+screen.height});
try{ navigator.sendBeacon(TELEMETRY_EP, JSON.stringify(Object.assign({ev:'rocket'},base()))); }catch(e){}
addEventListener('pagehide',()=>{ if(pokes>0)
  try{ navigator.sendBeacon(TELEMETRY_EP, JSON.stringify(Object.assign({ev:'rocket_end', sc:pokes},base()))); }catch(e){} });

/* ── debug hooks for headless verification: ?kick=vx,vy,spin · ?face=dizzy|wheee ── */
if(Q.has('kick')){ const [kx,ky,ks]=(Q.get('kick')||'').split(',').map(Number);
  setTimeout(()=>{ vel.set(kx||30,ky||-10,0); angVel.set(0,0,ks||6); },600); }
const FORCED_FACE=Q.get('face')||null;
const LOWCAM=Q.has('lowcam');   // debug: the fin-inspection angle

/* ══ LOOP — fixed-timestep sim (the game taught us: never tie physics to display Hz) ══ */
const SIM=1/60; let last=performance.now(), acc=0, t=0;
function frame(now){
  acc+=Math.min(.1,(now-last)/1000); last=now; t++;
  while(acc>=SIM){ acc-=SIM; step(SIM); }
  root.position.copy(pos); root.quaternion.copy(quat);
  if(!REDUCED && !grabbed) squash.rotation.z=Math.sin(simT*.7)*.03;      // idle sway (visual only)

  stars1.material.opacity=.55+Math.sin(t*.013)*.3;
  stars2.material.opacity=.55+Math.cos(t*.017)*.3;
  planet.rotation.y+=.0012; planet.position.y=22+Math.sin(t*.006)*1.5;
  beacons.forEach((b,i)=>{ const s=1+Math.sin(t*.06+i)*.25; b.scale.set(s,s,s); });
  if(satellite){ const a=t*.008; satellite.position.set(Math.cos(a)*112, 26, Math.sin(a)*112); }

  // whisper of parallax toward the pointer keeps the frame alive
  if(LOWCAM){ cam.position.set(5,-16,26); cam.lookAt(0,-7,0); }
  else{
    cam.position.x+=((mouseX*1.6)-cam.position.x)*.03;
    cam.position.y+=((2.5+mouseY*1.2)-cam.position.y)*.03;
    cam.lookAt(0,1,0);
  }
  renderer.render(scene,cam);
  requestAnimationFrame(frame);
}
let mouseX=0, mouseY=0;
addEventListener('pointermove',e=>{ mouseX=e.clientX/innerWidth*2-1; mouseY=-(e.clientY/innerHeight)*2+1; },{passive:true});

function resize(){ renderer.setSize(innerWidth,innerHeight);
  cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix();
  const halfH=Math.tan(cam.fov*Math.PI/360)*CAMZ;
  wallX=Math.max(10,halfH*cam.aspect-7); wallTop=halfH-8; wallBot=halfH-9; }
addEventListener('resize',resize); resize();
requestAnimationFrame(frame);
</script>
